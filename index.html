<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hockey Arcade 3D — v2.0</title>
<style>
  body {
    margin: 0;
    background: radial-gradient(ellipse at 50% 30%, #24354a 0%, #141e2a 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #e8eef4;
  }
  h1 {
    font-size: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 10px 0 4px;
  }
  #infos {
    font-size: 13px;
    color: #9db2c7;
    margin-bottom: 10px;
  }

  /* ===== TABLEAU DE POINTAGE ===== */
  #pointage {
    display: flex;
    align-items: center;
    gap: 22px;
    background: linear-gradient(180deg, #16222f, #0d1620);
    border: 2px solid #33475e;
    border-radius: 8px;
    padding: 8px 24px;
    margin-bottom: 12px;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 1px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }
  .equipe-bleu { color: #4d9fff; }
  .equipe-rouge { color: #ff5a5a; }
  #horloge {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.1;
  }
  #periodeAffichee {
    font-size: 12px;
    color: #7d93a8;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #tempsAffiche {
    font-size: 26px;
    color: #ffd166;
    font-variant-numeric: tabular-nums;
  }

  /* ===== ZONE DE JEU ===== */
  #zoneJeu {
    position: relative;
    max-width: 96vw;
  }
  #zoneJeu canvas {
    display: block;
    max-width: 96vw;
    height: auto;
    border-radius: 10px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.6);
  }

  /* ===== LES COUCHES (menu, fin, message de but) ===== */
  .couche {
    position: absolute;
    inset: 0;
    background: rgba(13, 22, 32, 0.92);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .couche h2 {
    font-size: 32px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin: 0 0 4px;
    color: #ffd166;
  }
  .couche button {
    font-family: inherit;
    font-size: 17px;
    font-weight: bold;
    letter-spacing: 1px;
    padding: 12px 34px;
    min-width: 260px;
    border-radius: 8px;
    border: 2px solid #4d9fff;
    background: #14263d;
    color: #e8eef4;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .couche button:hover:not(:disabled) {
    background: #1d3a5c;
    transform: scale(1.04);
  }
  .couche button:disabled {
    border-color: #3a4a5c;
    color: #6b7d8f;
    cursor: not-allowed;
  }
  .couche .note {
    font-size: 12px;
    color: #7d93a8;
    margin-top: 4px;
  }
  .rangeeOptions {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 14px;
    color: #9db2c7;
  }
  .rangeeOptions button {
    min-width: 0;
    padding: 6px 14px;
    font-size: 14px;
    border-color: #3a4a5c;
  }
  .rangeeOptions button.actif {
    border-color: #ffd166;
    color: #ffd166;
  }
  #resultatFinal {
    font-size: 44px;
    font-weight: bold;
  }

  /* Le message "BUT!" : une couche transparente, juste le texte */
  #messageJeu {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 54px;
    font-weight: bold;
    color: #ffd166;
    text-shadow: 0 4px 18px rgba(0,0,0,0.8);
    pointer-events: none;   /* on peut pas cliquer dessus, il "laisse passer" */
  }
  .cache { display: none !important; }
</style>
</head>
<body>

<h1>Hockey Arcade 3D</h1>
<div id="infos"><b>WASD</b>/<b>flèches</b> pour patiner — <b>ESPACE</b> pour lancer — <b>Échap</b> pour le menu</div>

<div id="pointage">
  <span class="equipe-bleu">BLEU <span id="scoreBleu">0</span></span>
  <span id="horloge">
    <span id="periodeAffichee">1re période</span>
    <span id="tempsAffiche">2:00</span>
  </span>
  <span class="equipe-rouge"><span id="scoreRouge">0</span> ROUGE</span>
</div>

<div id="zoneJeu">
  <!-- Three.js va créer son propre canvas ici-dedans -->

  <div id="messageJeu" class="cache"></div>

  <div id="menu" class="couche">
    <h2>🏒 Hockey Arcade 3D</h2>
    <div class="rangeeOptions" id="choixDuree">
      Périodes :
      <button data-duree="60">1 min</button>
      <button data-duree="120" class="actif">2 min</button>

      Adversaire :
      <button data-niveau="rookie">🐣 Rookie</button>
      <button data-niveau="pro" class="actif">🏒 Pro</button>
      <button data-niveau="allstar">⭐ All-Star</button>
    </div>
    <button id="btnSolo">1 joueur — contre l'IA</button>
    <button disabled>2 joueurs — même clavier (bientôt)</button>
    <button disabled>En ligne (bientôt)</button>
    <div class="note">3 périodes + prolongation. Maintenant en 3D!</div>
  </div>

  <div id="finPartie" class="couche cache">
    <h2>Fin de la partie</h2>
    <div id="resultatFinal"></div>
    <button id="btnRejouer">Rejouer</button>
    <button id="btnRetourMenu">Retour au menu</button>
  </div>
</div>

<!-- Three.js, chargé d'un CDN : un seul fichier à copier, comme d'habitude! -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* =========================================================
   v2.0 : LE PASSAGE EN 3D
   =========================================================
   LE GRAND SECRET : la logique de jeu reste 100% en 2D!
   La physique, l'IA, les buts, le chrono — RIEN a changé.
   Ce qui change, c'est juste l'AFFICHAGE :
   - Avant : on dessinait des cercles sur un canvas 2D
   - Maintenant : chaque objet 2D a un "jumeau" 3D (un mesh),
     et à chaque image on copie la position 2D → 3D :
        2D (x, y)  →  3D (x, hauteur, z=y)
   La caméra regarde la patinoire d'un angle de diffusion télé.
========================================================= */

/* ===== LES MÊMES MESURES QU'AVANT (en "unités de jeu") ===== */
const LARGEUR = 940;
const HAUTEUR = 400;
const ECHELLE = LARGEUR / 200;

const LIGNE_BUT_G = 11 * ECHELLE;
const LIGNE_BUT_D = LARGEUR - LIGNE_BUT_G;
const LIGNE_BLEUE_G = 75 * ECHELLE;
const LIGNE_BLEUE_D = LARGEUR - LIGNE_BLEUE_G;
const CENTRE_X = LARGEUR / 2;
const CENTRE_Y = HAUTEUR / 2;
const RAYON_COIN = 28 * ECHELLE;

const DEMI_OUVERTURE = 3 * ECHELLE;
const PROFONDEUR_FILET = 3.3 * ECHELLE;
const FILET_HAUT = CENTRE_Y - DEMI_OUVERTURE;
const FILET_BAS  = CENTRE_Y + DEMI_OUVERTURE;

/* ===== NIVEAUX DE DIFFICULTÉ (identiques) ===== */
const NIVEAUX = {
  rookie: {
    nom: 'Rookie', vitesseMax: 4.2, accel: 0.26,
    imprecision: 4.2, distanceTir: 110, anticipation: 0
  },
  pro: {
    nom: 'Pro', vitesseMax: 4.9, accel: 0.32,
    imprecision: 2.4, distanceTir: 150, anticipation: 8
  },
  allstar: {
    nom: 'All-Star', vitesseMax: 5.3, accel: 0.37,
    imprecision: 1.1, distanceTir: 190, anticipation: 18
  }
};
let niveauChoisi = 'pro';

/* ===== ÉTAT DU JEU (identique) ===== */
let etat = 'menu';

const partie = {
  scoreBleu: 0,
  scoreRouge: 0,
  pauseBut: 0,
  texteBut: '',
  apresPause: 'miseAuJeu',
  periode: 1,
  dureePeriode: 120,
  tempsRestant: 120,
  prolongation: false,
  lumiereBut: null
};

/* ===== LES JOUEURS (données 2D identiques) ===== */
function creerJoueur(options) {
  return {
    x: options.x, y: options.y,
    departX: options.x, departY: options.y,
    vx: 0, vy: 0,
    angle: options.angle,
    rayon: 13,
    accel: options.accel,
    friction: 0.94,
    vitesseMax: options.vitesseMax,
    couleur: options.couleur,
    casque: options.casque,
    numero: options.numero,
    estIA: options.estIA,
    delaiReprise: 0,
    mesh: null            // NOUVEAU : son jumeau 3D (rempli plus bas)
  };
}

const joueurBleu = creerJoueur({
  x: CENTRE_X - 100, y: CENTRE_Y, angle: 0,
  accel: 0.35, vitesseMax: 5.2,
  couleur: 0x1560bd, casque: 0x0a2f5c, numero: '9', estIA: false
});

const joueurRouge = creerJoueur({
  x: CENTRE_X + 100, y: CENTRE_Y, angle: Math.PI,
  accel: 0.32, vitesseMax: 4.9,
  couleur: 0xc1272d, casque: 0x5c0a0d, numero: '4', estIA: true
});

const lesJoueurs = [joueurBleu, joueurRouge];

function appliquerNiveau(nomNiveau) {
  const n = NIVEAUX[nomNiveau];
  joueurRouge.vitesseMax = n.vitesseMax;
  joueurRouge.accel = n.accel;
  joueurRouge.niveau = n;
}

/* ===== LA RONDELLE (identique) ===== */
const rondelle = {
  x: CENTRE_X, y: CENTRE_Y,
  vx: 0, vy: 0,
  rayon: 6,
  friction: 0.985,
  proprietaire: null,
  mesh: null
};

/* ===== LE CLAVIER (identique) ===== */
const touches = {};
window.addEventListener('keydown', e => {
  touches[e.key.toLowerCase()] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }
  if (e.key === 'Escape' && etat === 'jeu') {
    ouvrirMenu();
  }
});
window.addEventListener('keyup', e => {
  touches[e.key.toLowerCase()] = false;
});

/* =========================================================
   LA SCÈNE 3D — tout le nouveau stock est ici!
========================================================= */

/* La scène = le "monde" qui contient tous les objets 3D */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x141e2a);
scene.fog = new THREE.Fog(0x141e2a, 900, 2100);   // brume au loin = profondeur

/* LA CAMÉRA : l'angle de diffusion télé.
   Elle est haute, reculée, et regarde le centre de la glace.
   → C'est ICI que tu joues si tu veux changer l'angle de vue! */
const camera = new THREE.PerspectiveCamera(38, 940 / 480, 1, 3000);
camera.position.set(CENTRE_X, 480, CENTRE_Y + 660);
camera.lookAt(CENTRE_X, -30, CENTRE_Y - 40);

/* LE RENDERER : la machine qui dessine la scène. Il crée son
   propre canvas, qu'on ajoute dans notre zone de jeu. */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(940, 480);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;   // ombres douces
document.getElementById('zoneJeu').prepend(renderer.domElement);

/* ===== LES LUMIÈRES =====
   Sans lumière, une scène 3D est toute noire! On met :
   - une ambiante (éclaire tout également, doucement)
   - une directionnelle (le "soleil" de l'aréna, projette les ombres) */
const lumiereAmbiante = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(lumiereAmbiante);

const lumierePrincipale = new THREE.DirectionalLight(0xfff4e0, 0.85);
lumierePrincipale.position.set(CENTRE_X - 200, 600, CENTRE_Y + 250);
lumierePrincipale.target.position.set(CENTRE_X, 0, CENTRE_Y);
lumierePrincipale.castShadow = true;
lumierePrincipale.shadow.camera.left = -600;
lumierePrincipale.shadow.camera.right = 600;
lumierePrincipale.shadow.camera.top = 400;
lumierePrincipale.shadow.camera.bottom = -400;
lumierePrincipale.shadow.mapSize.set(2048, 2048);
scene.add(lumierePrincipale);
scene.add(lumierePrincipale.target);

/* Les LUMIÈRES DE BUT : deux lumières rouges, éteintes par
   défaut (intensité 0). On les allume quand ça compte! */
const lumiereButG = new THREE.PointLight(0xff2020, 0, 260);
lumiereButG.position.set(LIGNE_BUT_G - 25, 45, CENTRE_Y);
scene.add(lumiereButG);
const lumiereButD = new THREE.PointLight(0xff2020, 0, 260);
lumiereButD.position.set(LIGNE_BUT_D + 25, 45, CENTRE_Y);
scene.add(lumiereButD);

/* =========================================================
   LA GLACE : LE TRUC LE PLUS BRILLANT DU FICHIER 😄
   Comment avoir toutes nos lignes NHL en 3D sans se casser
   la tête? On DESSINE la patinoire en 2D (notre code de la
   v1.2!) dans un canvas caché, et on colle ce dessin-là
   comme une TEXTURE sur le plancher 3D. Tout notre travail
   de la v1 est recyclé!
========================================================= */
function creerTextureGlace() {
  const c = document.createElement('canvas');
  // 2x plus grand que le jeu = texture nette même de proche
  c.width = LARGEUR * 2;
  c.height = HAUTEUR * 2;
  const g = c.getContext('2d');
  g.scale(2, 2);   // on dessine avec nos coordonnées habituelles

  // La glace
  const glace = g.createLinearGradient(0, 0, 0, HAUTEUR);
  glace.addColorStop(0, '#f4fafd');
  glace.addColorStop(1, '#dcebf5');
  g.fillStyle = glace;
  g.fillRect(0, 0, LARGEUR, HAUTEUR);

  // Marques de patins
  g.strokeStyle = 'rgba(150, 175, 200, 0.15)';
  g.lineWidth = 1;
  for (let i = 0; i < 90; i++) {
    const x = Math.random() * LARGEUR;
    const y = Math.random() * HAUTEUR;
    const longueur = 15 + Math.random() * 45;
    const angle = Math.random() * Math.PI * 2;
    g.beginPath();
    g.moveTo(x, y);
    g.lineTo(x + Math.cos(angle) * longueur, y + Math.sin(angle) * longueur);
    g.stroke();
  }

  // Trapèze des gardiens
  g.strokeStyle = 'rgba(214, 40, 40, 0.55)';
  g.lineWidth = 2;
  for (const [ligneX, dir] of [[LIGNE_BUT_G, -1], [LIGNE_BUT_D, 1]]) {
    g.beginPath();
    g.moveTo(ligneX, CENTRE_Y - 11 * ECHELLE);
    g.lineTo(ligneX + dir * LIGNE_BUT_G, CENTRE_Y - 14 * ECHELLE);
    g.moveTo(ligneX, CENTRE_Y + 11 * ECHELLE);
    g.lineTo(ligneX + dir * LIGNE_BUT_G, CENTRE_Y + 14 * ECHELLE);
    g.stroke();
  }

  // Lignes bleues
  g.fillStyle = '#1560bd';
  g.fillRect(LIGNE_BLEUE_G - 3, 0, 6, HAUTEUR);
  g.fillRect(LIGNE_BLEUE_D - 3, 0, 6, HAUTEUR);

  // Ligne rouge centrale + pointillé blanc
  g.fillStyle = '#d62828';
  g.fillRect(CENTRE_X - 3, 0, 6, HAUTEUR);
  g.strokeStyle = 'rgba(255,255,255,0.85)';
  g.lineWidth = 1.5;
  g.setLineDash([7, 9]);
  g.beginPath();
  g.moveTo(CENTRE_X, 0);
  g.lineTo(CENTRE_X, HAUTEUR);
  g.stroke();
  g.setLineDash([]);

  // Lignes de but
  g.fillStyle = '#d62828';
  g.fillRect(LIGNE_BUT_G - 1, 0, 2, HAUTEUR);
  g.fillRect(LIGNE_BUT_D - 1, 0, 2, HAUTEUR);

  // Cercle central + logo
  g.strokeStyle = '#1560bd';
  g.lineWidth = 2;
  g.beginPath();
  g.arc(CENTRE_X, CENTRE_Y, 15 * ECHELLE, 0, Math.PI * 2);
  g.stroke();
  g.fillStyle = 'rgba(21, 96, 189, 0.18)';
  g.font = 'bold 44px Arial';
  g.textAlign = 'center';
  g.textBaseline = 'middle';
  g.fillText('HA', CENTRE_X, CENTRE_Y);
  g.fillStyle = '#1560bd';
  g.beginPath();
  g.arc(CENTRE_X, CENTRE_Y, 4, 0, Math.PI * 2);
  g.fill();

  // Cercles de mise au jeu + hachures + points
  const cercleX_G = LIGNE_BUT_G + 20 * ECHELLE;
  const cercleX_D = LIGNE_BUT_D - 20 * ECHELLE;
  const cercleY_H = CENTRE_Y - 22 * ECHELLE;
  const cercleY_B = CENTRE_Y + 22 * ECHELLE;
  const R_CERCLE = 15 * ECHELLE;
  for (const cx of [cercleX_G, cercleX_D]) {
    for (const cy of [cercleY_H, cercleY_B]) {
      g.strokeStyle = '#d62828';
      g.lineWidth = 2;
      g.beginPath();
      g.arc(cx, cy, R_CERCLE, 0, Math.PI * 2);
      g.stroke();
      for (const cote of [-1, 1]) {
        for (const dx of [-8, 8]) {
          g.beginPath();
          g.moveTo(cx + dx, cy + cote * R_CERCLE);
          g.lineTo(cx + dx, cy + cote * (R_CERCLE + 7));
          g.stroke();
        }
      }
      g.fillStyle = '#d62828';
      g.beginPath();
      g.arc(cx, cy, 4, 0, Math.PI * 2);
      g.fill();
    }
  }
  g.fillStyle = '#d62828';
  for (const px of [LIGNE_BLEUE_G + 5 * ECHELLE, LIGNE_BLEUE_D - 5 * ECHELLE]) {
    for (const py of [cercleY_H, cercleY_B]) {
      g.beginPath();
      g.arc(px, py, 4, 0, Math.PI * 2);
      g.fill();
    }
  }

  // Demi-cercles des gardiens
  g.fillStyle = 'rgba(100, 180, 235, 0.5)';
  g.strokeStyle = '#d62828';
  g.lineWidth = 2;
  g.beginPath();
  g.arc(LIGNE_BUT_G, CENTRE_Y, 6 * ECHELLE, -Math.PI / 2, Math.PI / 2);
  g.fill(); g.stroke();
  g.beginPath();
  g.arc(LIGNE_BUT_D, CENTRE_Y, 6 * ECHELLE, Math.PI / 2, Math.PI * 1.5);
  g.fill(); g.stroke();

  return new THREE.CanvasTexture(c);
}

/* Le plancher : un grand rectangle plat, couché à l'horizontale,
   avec notre dessin de patinoire collé dessus. */
const solGeo = new THREE.PlaneGeometry(LARGEUR, HAUTEUR);
const solMat = new THREE.MeshStandardMaterial({
  map: creerTextureGlace(),
  roughness: 0.25,      // faible rugosité = la glace REFLÈTE la lumière
  metalness: 0.05
});
const sol = new THREE.Mesh(solGeo, solMat);
sol.rotation.x = -Math.PI / 2;   // par défaut un plan est vertical : on le couche
sol.position.set(CENTRE_X, 0, CENTRE_Y);
sol.receiveShadow = true;        // les ombres se dessinent DESSUS
scene.add(sol);

/* ===== LES BANDES =====
   Quatre murs bas autour de la glace : blancs avec la plaque
   jaune, et une "vitre" translucide au-dessus. */
const HAUTEUR_BANDE = 22;
const matBande = new THREE.MeshStandardMaterial({ color: 0xf5f7fa, roughness: 0.6 });
const matPlaque = new THREE.MeshStandardMaterial({ color: 0xe8c547, roughness: 0.6 });
const matVitre = new THREE.MeshStandardMaterial({
  color: 0xbfe3ff, transparent: true, opacity: 0.16,
  roughness: 0.05, side: THREE.DoubleSide
});

function creerMur(longueurX, longueurZ, posX, posZ) {
  const groupe = new THREE.Group();

  // La bande blanche
  const bande = new THREE.Mesh(
    new THREE.BoxGeometry(longueurX || 8, HAUTEUR_BANDE, longueurZ || 8),
    matBande
  );
  bande.position.y = HAUTEUR_BANDE / 2;
  bande.castShadow = true;
  groupe.add(bande);

  // La plaque jaune (une boîte mince en bas, côté glace)
  const plaque = new THREE.Mesh(
    new THREE.BoxGeometry((longueurX || 8) + 1, 6, (longueurZ || 8) + 1),
    matPlaque
  );
  plaque.position.y = 3;
  groupe.add(plaque);

  // La vitre au-dessus
  const vitre = new THREE.Mesh(
    new THREE.BoxGeometry(longueurX || 2, 26, longueurZ || 2),
    matVitre
  );
  vitre.position.y = HAUTEUR_BANDE + 13;
  groupe.add(vitre);

  groupe.position.set(posX, 0, posZ);
  scene.add(groupe);
}

creerMur(LARGEUR + 8, 0, CENTRE_X, -4);            // mur du fond
creerMur(LARGEUR + 8, 0, CENTRE_X, HAUTEUR + 4);   // mur avant
creerMur(0, HAUTEUR + 8, -4, CENTRE_Y);            // mur gauche
creerMur(0, HAUTEUR + 8, LARGEUR + 4, CENTRE_Y);   // mur droit

/* ===== LES FILETS =====
   Poteaux rouges (cylindres), barre horizontale, cadre arrière,
   et un "tissu" semi-transparent. */
function creerFilet(ligneX, direction) {
  const groupe = new THREE.Group();
  const matRouge = new THREE.MeshStandardMaterial({ color: 0xd62828, roughness: 0.4 });
  const matTissu = new THREE.MeshStandardMaterial({
    color: 0xdde5ec, transparent: true, opacity: 0.4, side: THREE.DoubleSide
  });
  const H_FILET = 16;   // hauteur du filet

  // Les 2 poteaux
  for (const z of [FILET_HAUT, FILET_BAS]) {
    const poteau = new THREE.Mesh(
      new THREE.CylinderGeometry(1.6, 1.6, H_FILET, 10),
      matRouge
    );
    poteau.position.set(ligneX, H_FILET / 2, z);
    poteau.castShadow = true;
    groupe.add(poteau);
  }

  // La barre horizontale (en haut, entre les poteaux)
  const barre = new THREE.Mesh(
    new THREE.CylinderGeometry(1.4, 1.4, DEMI_OUVERTURE * 2, 10),
    matRouge
  );
  barre.rotation.x = Math.PI / 2;   // couchée le long de z
  barre.position.set(ligneX, H_FILET, CENTRE_Y);
  groupe.add(barre);

  // Le tissu : trois panneaux semi-transparents (fond + 2 côtés + toit)
  const fondX = ligneX + direction * PROFONDEUR_FILET;
  const fond = new THREE.Mesh(
    new THREE.PlaneGeometry(DEMI_OUVERTURE * 2, H_FILET * 0.8),
    matTissu
  );
  fond.rotation.y = Math.PI / 2;
  fond.position.set(fondX, H_FILET * 0.4, CENTRE_Y);
  groupe.add(fond);

  const toit = new THREE.Mesh(
    new THREE.PlaneGeometry(PROFONDEUR_FILET, DEMI_OUVERTURE * 2),
    matTissu
  );
  toit.rotation.x = -Math.PI / 2;
  toit.rotation.z = Math.PI / 2;
  toit.position.set(ligneX + direction * PROFONDEUR_FILET / 2, H_FILET * 0.8, CENTRE_Y);
  groupe.add(toit);

  for (const z of [FILET_HAUT, FILET_BAS]) {
    const cote = new THREE.Mesh(
      new THREE.PlaneGeometry(PROFONDEUR_FILET, H_FILET * 0.8),
      matTissu
    );
    cote.position.set(ligneX + direction * PROFONDEUR_FILET / 2, H_FILET * 0.4, z);
    groupe.add(cote);
  }

  scene.add(groupe);
}
creerFilet(LIGNE_BUT_G, -1);
creerFilet(LIGNE_BUT_D, +1);

/* =========================================================
   LES JOUEURS 3D
   Chaque joueur est un GROUPE : corps + tête + bâton + palette,
   assemblés ensemble. Bouger le groupe = tout bouge.
   Dans le groupe, "devant" = l'axe +x (comme en 2D!).
========================================================= */
function creerMeshJoueur(j) {
  const groupe = new THREE.Group();
  const matChandail = new THREE.MeshStandardMaterial({ color: j.couleur, roughness: 0.7 });
  const matCasque = new THREE.MeshStandardMaterial({ color: j.casque, roughness: 0.3 });
  const matBaton = new THREE.MeshStandardMaterial({ color: 0x8a5a2b, roughness: 0.8 });

  // LE CORPS : un cylindre un peu conique (épaules plus larges en haut)
  const corps = new THREE.Mesh(
    new THREE.CylinderGeometry(j.rayon * 0.8, j.rayon * 0.55, 22, 14),
    matChandail
  );
  corps.position.y = 11;
  corps.castShadow = true;
  groupe.add(corps);

  // LES ÉPAULES : une sphère aplatie posée sur le corps
  const epaules = new THREE.Mesh(
    new THREE.SphereGeometry(j.rayon * 0.82, 14, 10),
    matChandail
  );
  epaules.scale.y = 0.5;
  epaules.position.y = 22;
  epaules.castShadow = true;
  groupe.add(epaules);

  // LA TÊTE / CASQUE
  const tete = new THREE.Mesh(
    new THREE.SphereGeometry(5.5, 14, 12),
    matCasque
  );
  tete.position.y = 29;
  tete.castShadow = true;
  groupe.add(tete);

  // LE BÂTON : un manche penché vers l'avant-droite + la palette au sol
  const manche = new THREE.Mesh(
    new THREE.CylinderGeometry(0.9, 0.9, 30, 8),
    matBaton
  );
  manche.position.set(j.rayon + 4, 12, 8);
  manche.rotation.z = -0.9;      // penché vers l'avant
  manche.rotation.x = 0.25;      // et un peu vers le côté
  groupe.add(manche);

  const palette = new THREE.Mesh(
    new THREE.BoxGeometry(9, 2, 3),
    matBaton
  );
  palette.position.set(j.rayon + 15, 1, 10.5);
  palette.rotation.y = 0.5;
  groupe.add(palette);

  // LE NUMÉRO : dessiné dans un mini-canvas, collé sur un
  // "sprite" (un panneau qui fait TOUJOURS face à la caméra)
  const cNum = document.createElement('canvas');
  cNum.width = 64; cNum.height = 64;
  const gNum = cNum.getContext('2d');
  gNum.fillStyle = 'rgba(255,255,255,0.95)';
  gNum.strokeStyle = 'rgba(20,30,45,0.9)';
  gNum.lineWidth = 6;
  gNum.font = 'bold 44px Arial';
  gNum.textAlign = 'center';
  gNum.textBaseline = 'middle';
  gNum.strokeText(j.numero, 32, 34);
  gNum.fillText(j.numero, 32, 34);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
    map: new THREE.CanvasTexture(cNum), transparent: true
  }));
  sprite.scale.set(16, 16, 1);
  sprite.position.y = 44;
  groupe.add(sprite);

  scene.add(groupe);
  return groupe;
}

joueurBleu.mesh = creerMeshJoueur(joueurBleu);
joueurRouge.mesh = creerMeshJoueur(joueurRouge);

/* ===== LA RONDELLE 3D : un petit cylindre noir plat ===== */
const puckMesh = new THREE.Mesh(
  new THREE.CylinderGeometry(rondelle.rayon, rondelle.rayon, 3, 16),
  new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.35 })
);
puckMesh.position.y = 1.5;
puckMesh.castShadow = true;
scene.add(puckMesh);
rondelle.mesh = puckMesh;

/* =========================================================
   LA SYNCHRONISATION 2D → 3D
   Le coeur du système : après chaque mise à jour de la
   physique 2D, on copie les positions vers les meshes.
   Règle de conversion : 2D (x, y) → 3D (x, 0, z=y)
   Et l'angle 2D devient une rotation autour de l'axe vertical.
========================================================= */
function synchroniser3D() {
  for (const j of lesJoueurs) {
    j.mesh.position.x = j.x;
    j.mesh.position.z = j.y;
    j.mesh.rotation.y = -j.angle;   // le -angle : l'axe z 3D pointe "vers nous"
  }
  rondelle.mesh.position.x = rondelle.x;
  rondelle.mesh.position.z = rondelle.y;

  // Les lumières de but : allumées? Le pulse vient de Math.sin,
  // exactement comme en 2D — la recette change pas!
  const pulse = 4 + Math.sin(partie.pauseBut * 0.45) * 3;
  lumiereButG.intensity = (partie.pauseBut > 0 && partie.lumiereBut === 'gauche') ? pulse : 0;
  lumiereButD.intensity = (partie.pauseBut > 0 && partie.lumiereBut === 'droit') ? pulse : 0;
}

/* =========================================================
   À PARTIR D'ICI : LA LOGIQUE DE JEU — IDENTIQUE À LA v1!
   (physique, IA, collisions, buts, chrono, écrans)
========================================================= */

const menuDiv = document.getElementById('menu');
const finDiv = document.getElementById('finPartie');
const messageDiv = document.getElementById('messageJeu');

document.querySelectorAll('#choixDuree button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#choixDuree button').forEach(b => b.classList.remove('actif'));
    btn.classList.add('actif');
    partie.dureePeriode = parseInt(btn.dataset.duree);
  });
});

document.querySelectorAll('#choixNiveau button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#choixNiveau button').forEach(b => b.classList.remove('actif'));
    btn.classList.add('actif');
    niveauChoisi = btn.dataset.niveau;
  });
});

document.getElementById('btnSolo').addEventListener('click', demarrerPartie);
document.getElementById('btnRejouer').addEventListener('click', demarrerPartie);
document.getElementById('btnRetourMenu').addEventListener('click', () => {
  finDiv.classList.add('cache');
  ouvrirMenu();
});

function demarrerPartie() {
  appliquerNiveau(niveauChoisi);
  partie.scoreBleu = 0;
  partie.scoreRouge = 0;
  partie.periode = 1;
  partie.tempsRestant = partie.dureePeriode;
  partie.prolongation = false;
  partie.pauseBut = 0;
  partie.lumiereBut = null;
  mettreAJourPointage();
  mettreAJourHorloge();
  miseAuJeu();
  menuDiv.classList.add('cache');
  finDiv.classList.add('cache');
  messageDiv.classList.add('cache');
  etat = 'jeu';
}

function ouvrirMenu() {
  etat = 'menu';
  menuDiv.classList.remove('cache');
}

function appliquerPoussee(j, pousseeX, pousseeY) {
  const longueur = Math.hypot(pousseeX, pousseeY);
  if (longueur > 1) {
    pousseeX /= longueur;
    pousseeY /= longueur;
  }

  j.vx += pousseeX * j.accel;
  j.vy += pousseeY * j.accel;
  j.vx *= j.friction;
  j.vy *= j.friction;

  const vitesse = Math.hypot(j.vx, j.vy);
  if (vitesse > j.vitesseMax) {
    j.vx = (j.vx / vitesse) * j.vitesseMax;
    j.vy = (j.vy / vitesse) * j.vitesseMax;
  }

  j.x += j.vx;
  j.y += j.vy;

  if (vitesse > 0.5) {
    j.angle = Math.atan2(j.vy, j.vx);
  }

  const marge = j.rayon + 5;
  if (j.x < marge)           { j.x = marge;           j.vx *= -0.4; }
  if (j.x > LARGEUR - marge) { j.x = LARGEUR - marge; j.vx *= -0.4; }
  if (j.y < marge)           { j.y = marge;           j.vy *= -0.4; }
  if (j.y > HAUTEUR - marge) { j.y = HAUTEUR - marge; j.vy *= -0.4; }
}

function pousseeClavier() {
  let px = 0, py = 0;
  if (touches['w'] || touches['arrowup'])    py -= 1;
  if (touches['s'] || touches['arrowdown'])  py += 1;
  if (touches['a'] || touches['arrowleft'])  px -= 1;
  if (touches['d'] || touches['arrowright']) px += 1;
  return { px, py };
}

function cerveauIA(ia) {
  const niveau = ia.niveau;
  let cibleX, cibleY;

  if (rondelle.proprietaire === ia) {
    cibleX = LIGNE_BUT_G;
    cibleY = CENTRE_Y;

    const distFilet = Math.hypot(ia.x - LIGNE_BUT_G, ia.y - CENTRE_Y);
    if (distFilet < niveau.distanceTir) {
      tirerIA(ia);
    }
  } else if (rondelle.proprietaire) {
    const porteur = rondelle.proprietaire;
    cibleX = porteur.x + (LIGNE_BUT_D - porteur.x) * 0.15;
    cibleY = porteur.y + (CENTRE_Y - porteur.y) * 0.15;
  } else {
    cibleX = rondelle.x + rondelle.vx * niveau.anticipation;
    cibleY = rondelle.y + rondelle.vy * niveau.anticipation;
  }

  return { px: cibleX - ia.x, py: cibleY - ia.y };
}

function tirerIA(ia) {
  const FORCE_LANCER = 8.5;
  const imprecision = (Math.random() - 0.5) * (DEMI_OUVERTURE * ia.niveau.imprecision);
  const angle = Math.atan2((CENTRE_Y + imprecision) - ia.y, LIGNE_BUT_G - ia.x);

  rondelle.vx = Math.cos(angle) * FORCE_LANCER + ia.vx * 0.5;
  rondelle.vy = Math.sin(angle) * FORCE_LANCER + ia.vy * 0.5;
  rondelle.proprietaire = null;
  ia.delaiReprise = 20;
}

function collisionJoueurs(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const dist = Math.hypot(dx, dy);
  const minDist = a.rayon + b.rayon;

  if (dist >= minDist || dist === 0) return;

  const chevauchement = minDist - dist;
  const nx = dx / dist;
  const ny = dy / dist;
  a.x -= nx * chevauchement / 2;
  a.y -= ny * chevauchement / 2;
  b.x += nx * chevauchement / 2;
  b.y += ny * chevauchement / 2;

  const pousse = 1.5;
  a.vx -= nx * pousse;
  a.vy -= ny * pousse;
  b.vx += nx * pousse;
  b.vy += ny * pousse;

  if (rondelle.proprietaire === a || rondelle.proprietaire === b) {
    const porteur = rondelle.proprietaire;
    rondelle.proprietaire = null;
    rondelle.vx = porteur.vx + (Math.random() - 0.5) * 4;
    rondelle.vy = porteur.vy + (Math.random() - 0.5) * 4;
    porteur.delaiReprise = 25;
  }
}

function bougerRondelle(r) {
  if (r.proprietaire) {
    const p = r.proprietaire;
    const ca = Math.cos(p.angle);
    const sa = Math.sin(p.angle);
    r.x = p.x + ca * (p.rayon + 13) - sa * 9;
    r.y = p.y + sa * (p.rayon + 13) + ca * 9;
    r.vx = 0;
    r.vy = 0;
    return;
  }

  r.vx *= r.friction;
  r.vy *= r.friction;
  r.x += r.vx;
  r.y += r.vy;

  const marge = r.rayon + 5;
  if (r.x < marge)           { r.x = marge;           r.vx *= -0.75; }
  if (r.x > LARGEUR - marge) { r.x = LARGEUR - marge; r.vx *= -0.75; }
  if (r.y < marge)           { r.y = marge;           r.vy *= -0.75; }
  if (r.y > HAUTEUR - marge) { r.y = HAUTEUR - marge; r.vy *= -0.75; }
}

function verifierPossession() {
  if (rondelle.proprietaire) return;

  let gagnant = null;
  let meilleureDist = Infinity;

  for (const j of lesJoueurs) {
    if (j.delaiReprise > 0) continue;
    const dist = Math.hypot(j.x - rondelle.x, j.y - rondelle.y);
    if (dist < j.rayon + rondelle.rayon + 8 && dist < meilleureDist) {
      gagnant = j;
      meilleureDist = dist;
    }
  }

  if (gagnant) {
    rondelle.proprietaire = gagnant;
  }
}

function verifierLancerHumain() {
  if (!touches[' ']) return;
  if (rondelle.proprietaire !== joueurBleu) return;

  const FORCE_LANCER = 9;
  rondelle.vx = Math.cos(joueurBleu.angle) * FORCE_LANCER + joueurBleu.vx * 0.5;
  rondelle.vy = Math.sin(joueurBleu.angle) * FORCE_LANCER + joueurBleu.vy * 0.5;

  rondelle.proprietaire = null;
  joueurBleu.delaiReprise = 20;
}

function avancerChrono() {
  partie.tempsRestant -= 1 / 60;

  if (partie.tempsRestant <= 0) {
    partie.tempsRestant = 0;
    finDePeriode();
  }

  mettreAJourHorloge();
}

function mettreAJourHorloge() {
  const minutes = Math.floor(partie.tempsRestant / 60);
  const secondes = Math.ceil(partie.tempsRestant % 60);
  const s = secondes === 60 ? 0 : secondes;
  const m = secondes === 60 ? minutes + 1 : minutes;
  document.getElementById('tempsAffiche').textContent =
    m + ':' + String(s).padStart(2, '0');

  const noms = ['', '1re période', '2e période', '3e période'];
  document.getElementById('periodeAffichee').textContent =
    partie.prolongation ? 'PROLONGATION' : noms[partie.periode];
}

function finDePeriode() {
  if (partie.periode < 3) {
    declencherPause('Fin de la ' + (partie.periode === 1 ? '1re' : '2e') + ' période', 'prochainePeriode');
  } else {
    if (partie.scoreBleu === partie.scoreRouge) {
      partie.prolongation = true;
      declencherPause('PROLONGATION — premier but gagne!', 'miseAuJeu');
    } else {
      finDePartie();
    }
  }
}

function finDePartie() {
  etat = 'fin';
  messageDiv.classList.add('cache');

  const resultat = document.getElementById('resultatFinal');
  const nomNiveau = NIVEAUX[niveauChoisi].nom;
  if (partie.scoreBleu > partie.scoreRouge) {
    resultat.textContent = '🏆 Victoire ' + partie.scoreBleu + '-' + partie.scoreRouge + ' contre ' + nomNiveau + '!';
    resultat.style.color = '#4d9fff';
  } else {
    resultat.textContent = nomNiveau + ' gagne ' + partie.scoreRouge + ' à ' + partie.scoreBleu + '...';
    resultat.style.color = '#ff5a5a';
  }

  finDiv.classList.remove('cache');
}

function verifierBut() {
  const r = rondelle;
  if (r.proprietaire) return;
  if (partie.pauseBut > 0) return;

  const dansOuverture = r.y > FILET_HAUT && r.y < FILET_BAS;

  if (dansOuverture && r.x > LIGNE_BUT_D + r.rayon) {
    partie.scoreBleu++;
    partie.lumiereBut = 'droit';
    mettreAJourPointage();
    if (partie.prolongation) {
      declencherPause('BUT EN PROLONGATION! 🚨', 'finDePartie');
    } else {
      declencherPause('BUT! 🚨', 'miseAuJeu');
    }
  } else if (dansOuverture && r.x < LIGNE_BUT_G - r.rayon) {
    partie.scoreRouge++;
    partie.lumiereBut = 'gauche';
    mettreAJourPointage();
    if (partie.prolongation) {
      declencherPause('Rouge compte en prolongation...', 'finDePartie');
    } else {
      declencherPause('BUT DE ROUGE...', 'miseAuJeu');
    }
  }
}

/* Le message "BUT!" est maintenant un div HTML par-dessus la
   scène 3D — plus simple que d'écrire du texte en 3D. */
function declencherPause(texte, apres) {
  partie.texteBut = texte;
  partie.pauseBut = 130;
  partie.apresPause = apres;
  messageDiv.textContent = texte;
  messageDiv.classList.remove('cache');
}

function terminerPause() {
  partie.lumiereBut = null;
  messageDiv.classList.add('cache');
  if (partie.apresPause === 'prochainePeriode') {
    partie.periode++;
    partie.tempsRestant = partie.dureePeriode;
    miseAuJeu();
    mettreAJourHorloge();
  } else if (partie.apresPause === 'finDePartie') {
    finDePartie();
  } else {
    miseAuJeu();
  }
}

function mettreAJourPointage() {
  document.getElementById('scoreBleu').textContent = partie.scoreBleu;
  document.getElementById('scoreRouge').textContent = partie.scoreRouge;
}

function miseAuJeu() {
  rondelle.x = CENTRE_X;
  rondelle.y = CENTRE_Y;
  rondelle.vx = 0;
  rondelle.vy = 0;
  rondelle.proprietaire = null;

  for (const j of lesJoueurs) {
    j.x = j.departX;
    j.y = j.departY;
    j.vx = 0;
    j.vy = 0;
    j.angle = (j === joueurBleu) ? 0 : Math.PI;
    j.delaiReprise = 0;
  }
}

/* =========================================================
   LA BOUCLE DE JEU
   Même structure qu'avant. La seule différence : à la fin,
   au lieu de dessiner en 2D, on synchronise les positions
   et on demande au renderer de dessiner la scène 3D.
========================================================= */
function boucle() {
  if (etat === 'jeu') {
    if (partie.pauseBut > 0) {
      partie.pauseBut--;
      if (partie.pauseBut === 0) {
        terminerPause();
      }
    } else {
      const { px, py } = pousseeClavier();
      appliquerPoussee(joueurBleu, px, py);

      const decision = cerveauIA(joueurRouge);
      appliquerPoussee(joueurRouge, decision.px, decision.py);

      collisionJoueurs(joueurBleu, joueurRouge);
      verifierLancerHumain();
      verifierPossession();
      bougerRondelle(rondelle);
      verifierBut();
      avancerChrono();

      for (const j of lesJoueurs) {
        if (j.delaiReprise > 0) j.delaiReprise--;
      }
    }
  }

  synchroniser3D();                  // 2D → 3D
  renderer.render(scene, camera);    // et Three.js dessine tout!

  requestAnimationFrame(boucle);
}

boucle();
