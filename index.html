<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hockey Arcade — Étape 3</title>
<style>
  /* ===== MISE EN PAGE DE BASE ===== */
  body {
    margin: 0;
    background: #1a2634;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #e8eef4;
  }
  h1 {
    font-size: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 10px 0 4px;
  }
  #infos {
    font-size: 13px;
    color: #9db2c7;
    margin-bottom: 10px;
  }

  /* ===== LE TABLEAU DE POINTAGE (nouveau!) ===== */
  #pointage {
    display: flex;
    align-items: center;
    gap: 18px;
    background: #0d1620;
    border: 2px solid #33475e;
    border-radius: 8px;
    padding: 8px 24px;
    margin-bottom: 12px;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 1px;
  }
  .equipe-bleu { color: #4d9fff; }
  .equipe-rouge { color: #ff5a5a; }
  #pointage .tiret { color: #55708c; font-size: 20px; }

  canvas {
    max-width: 96vw;
    height: auto;
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

<h1>Hockey Arcade</h1>
<div id="infos">Patine avec <b>WASD</b>/<b>flèches</b> — Lance avec <b>ESPACE</b> — Compte dans le filet de droite!</div>

<!-- Le tableau de pointage : du HTML ordinaire, mis à jour par le JS -->
<div id="pointage">
  <span class="equipe-bleu">BLEU <span id="scoreBleu">0</span></span>
  <span class="tiret">—</span>
  <span class="equipe-rouge"><span id="scoreRouge">0</span> ROUGE</span>
</div>

<canvas id="glace" width="940" height="400"></canvas>

<script>
/* =========================================================
   ÉTAPE 3 : LES FILETS, LES BUTS ET LE POINTAGE
   =========================================================
   Nouveautés :
   1) Deux filets dessinés sur les lignes de but
   2) Détection de but : la rondelle traverse la ligne DANS
      l'ouverture du filet
   3) Un tableau de pointage (en HTML, mis à jour par le JS)
   4) La séquence de but : "BUT!" à l'écran, petite pause,
      remise au jeu au centre
========================================================= */

const canvas = document.getElementById('glace');
const ctx = canvas.getContext('2d');

const LARGEUR = canvas.width;
const HAUTEUR = canvas.height;
const ECHELLE = LARGEUR / 200;

/* ===== MESURES DE LA PATINOIRE ===== */
const RAYON_COIN = 28 * ECHELLE;
const LIGNE_BUT_G = 11 * ECHELLE;
const LIGNE_BUT_D = LARGEUR - LIGNE_BUT_G;
const LIGNE_BLEUE_G = 75 * ECHELLE;
const LIGNE_BLEUE_D = LARGEUR - LIGNE_BLEUE_G;
const CENTRE_X = LARGEUR / 2;
const CENTRE_Y = HAUTEUR / 2;

/* ===== LES FILETS (nouveau!) =====
   Un vrai filet NHL a une ouverture de 6 pieds de large et
   environ 3.3 pieds de profond. L'ouverture du filet de gauche
   regarde vers la droite (le centre), et vice-versa. */
const DEMI_OUVERTURE = 3 * ECHELLE;      // 6 pieds au total
const PROFONDEUR_FILET = 3.3 * ECHELLE;
const FILET_HAUT = CENTRE_Y - DEMI_OUVERTURE;
const FILET_BAS  = CENTRE_Y + DEMI_OUVERTURE;

/* ===== L'ÉTAT DE LA PARTIE (nouveau!) =====
   Le pointage + une "pause" quand un but est compté. */
const partie = {
  scoreBleu: 0,
  scoreRouge: 0,
  pauseBut: 0,        // compte à rebours (en images) après un but
  texteBut: ''        // le message affiché ("BUT!")
};

/* ===== LE JOUEUR ===== */
const joueur = {
  x: LARGEUR / 2 - 100,
  y: HAUTEUR / 2,
  vx: 0,
  vy: 0,
  angle: 0,
  rayon: 13,
  accel: 0.35,
  friction: 0.94,
  vitesseMax: 5.2,
  aLaRondelle: false
};

/* ===== LA RONDELLE ===== */
const rondelle = {
  x: CENTRE_X,
  y: CENTRE_Y,
  vx: 0,
  vy: 0,
  rayon: 6,
  friction: 0.985,
  proprietaire: null
};

let delaiReprise = 0;

/* ===== LE CLAVIER ===== */
const touches = {};
window.addEventListener('keydown', e => {
  touches[e.key.toLowerCase()] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => {
  touches[e.key.toLowerCase()] = false;
});

/* =========================================================
   DESSINER LA PATINOIRE
========================================================= */
function dessinerPatinoire() {
  ctx.save();
  tracerContourPatinoire();
  ctx.fillStyle = '#eef6fb';
  ctx.fill();
  ctx.clip();

  ctx.fillStyle = '#1560bd';
  ctx.fillRect(LIGNE_BLEUE_G - 3, 0, 6, HAUTEUR);
  ctx.fillRect(LIGNE_BLEUE_D - 3, 0, 6, HAUTEUR);

  ctx.fillStyle = '#d62828';
  ctx.fillRect(CENTRE_X - 3, 0, 6, HAUTEUR);
  ctx.fillRect(LIGNE_BUT_G - 1, 0, 2, HAUTEUR);
  ctx.fillRect(LIGNE_BUT_D - 1, 0, 2, HAUTEUR);

  ctx.strokeStyle = '#1560bd';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(CENTRE_X, CENTRE_Y, 15 * ECHELLE, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = '#1560bd';
  ctx.beginPath();
  ctx.arc(CENTRE_X, CENTRE_Y, 4, 0, Math.PI * 2);
  ctx.fill();

  const cercleX_G = LIGNE_BUT_G + 20 * ECHELLE;
  const cercleX_D = LIGNE_BUT_D - 20 * ECHELLE;
  const cercleY_H = CENTRE_Y - 22 * ECHELLE;
  const cercleY_B = CENTRE_Y + 22 * ECHELLE;
  ctx.strokeStyle = '#d62828';
  for (const cx of [cercleX_G, cercleX_D]) {
    for (const cy of [cercleY_H, cercleY_B]) {
      ctx.beginPath();
      ctx.arc(cx, cy, 15 * ECHELLE, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = '#d62828';
      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.fillStyle = 'rgba(100, 180, 235, 0.45)';
  ctx.strokeStyle = '#d62828';
  ctx.beginPath();
  ctx.arc(LIGNE_BUT_G, CENTRE_Y, 6 * ECHELLE, -Math.PI / 2, Math.PI / 2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.arc(LIGNE_BUT_D, CENTRE_Y, 6 * ECHELLE, Math.PI / 2, Math.PI * 1.5);
  ctx.fill(); ctx.stroke();

  ctx.restore();

  tracerContourPatinoire();
  ctx.strokeStyle = '#33475e';
  ctx.lineWidth = 5;
  ctx.stroke();
}

function tracerContourPatinoire() {
  ctx.beginPath();
  ctx.roundRect(2, 2, LARGEUR - 4, HAUTEUR - 4, RAYON_COIN);
}

/* =========================================================
   DESSINER LES FILETS (nouveau!)
   Un filet = un cadre rouge en "U" + un quadrillage pour
   imiter le filet. Le filet de gauche s'ouvre vers la droite.
========================================================= */
function dessinerFilets() {
  dessinerUnFilet(LIGNE_BUT_G, -1);   // filet gauche (rouge défend ici)
  dessinerUnFilet(LIGNE_BUT_D, +1);   // filet droit
}

function dessinerUnFilet(ligneX, direction) {
  // direction = -1 : le filet s'étend vers la GAUCHE de la ligne
  // direction = +1 : vers la DROITE
  const fondX = ligneX + direction * PROFONDEUR_FILET;

  // Le "tissu" du filet : un fond gris pâle quadrillé
  ctx.fillStyle = 'rgba(200, 210, 220, 0.6)';
  ctx.fillRect(Math.min(ligneX, fondX), FILET_HAUT,
               PROFONDEUR_FILET, DEMI_OUVERTURE * 2);
  ctx.strokeStyle = 'rgba(120, 135, 150, 0.7)';
  ctx.lineWidth = 1;
  // Lignes verticales du quadrillage
  for (let i = 1; i < 4; i++) {
    const x = ligneX + direction * (PROFONDEUR_FILET * i / 4);
    ctx.beginPath();
    ctx.moveTo(x, FILET_HAUT);
    ctx.lineTo(x, FILET_BAS);
    ctx.stroke();
  }
  // Lignes horizontales
  for (let i = 1; i < 4; i++) {
    const y = FILET_HAUT + (DEMI_OUVERTURE * 2 * i / 4);
    ctx.beginPath();
    ctx.moveTo(ligneX, y);
    ctx.lineTo(fondX, y);
    ctx.stroke();
  }

  // Le cadre rouge (les poteaux + le fond)
  ctx.strokeStyle = '#d62828';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(ligneX, FILET_HAUT);
  ctx.lineTo(fondX, FILET_HAUT);
  ctx.lineTo(fondX, FILET_BAS);
  ctx.lineTo(ligneX, FILET_BAS);
  ctx.stroke();
}

/* =========================================================
   DESSINER JOUEUR ET RONDELLE
========================================================= */
function dessinerJoueur(j) {
  const boutX = j.x + Math.cos(j.angle) * (j.rayon + 12);
  const boutY = j.y + Math.sin(j.angle) * (j.rayon + 12);
  ctx.strokeStyle = '#8a5a2b';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(j.x, j.y);
  ctx.lineTo(boutX, boutY);
  ctx.stroke();

  ctx.fillStyle = '#1560bd';
  ctx.strokeStyle = '#0d3d7a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(j.x, j.y, j.rayon, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 12px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('9', j.x, j.y + 1);
}

function dessinerRondelle(r) {
  ctx.fillStyle = '#111111';
  ctx.beginPath();
  ctx.arc(r.x, r.y, r.rayon, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.arc(r.x - 2, r.y - 2, 2, 0, Math.PI * 2);
  ctx.fill();
}

/* ===== LE MESSAGE "BUT!" (nouveau!) ===== */
function dessinerMessageBut() {
  if (partie.pauseBut <= 0) return;
  ctx.fillStyle = 'rgba(13, 22, 32, 0.6)';   // voile foncé sur la glace
  ctx.fillRect(0, 0, LARGEUR, HAUTEUR);
  ctx.fillStyle = '#ffd166';
  ctx.font = 'bold 64px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(partie.texteBut, CENTRE_X, CENTRE_Y);
}

/* =========================================================
   PHYSIQUE DU JOUEUR
========================================================= */
function bougerJoueur(j) {
  let pousseeX = 0, pousseeY = 0;
  if (touches['w'] || touches['arrowup'])    pousseeY -= 1;
  if (touches['s'] || touches['arrowdown'])  pousseeY += 1;
  if (touches['a'] || touches['arrowleft'])  pousseeX -= 1;
  if (touches['d'] || touches['arrowright']) pousseeX += 1;

  if (pousseeX !== 0 && pousseeY !== 0) {
    pousseeX *= 0.707;
    pousseeY *= 0.707;
  }

  j.vx += pousseeX * j.accel;
  j.vy += pousseeY * j.accel;
  j.vx *= j.friction;
  j.vy *= j.friction;

  const vitesse = Math.hypot(j.vx, j.vy);
  if (vitesse > j.vitesseMax) {
    j.vx = (j.vx / vitesse) * j.vitesseMax;
    j.vy = (j.vy / vitesse) * j.vitesseMax;
  }

  j.x += j.vx;
  j.y += j.vy;

  if (vitesse > 0.5) {
    j.angle = Math.atan2(j.vy, j.vx);
  }

  const marge = j.rayon + 5;
  if (j.x < marge)           { j.x = marge;           j.vx *= -0.4; }
  if (j.x > LARGEUR - marge) { j.x = LARGEUR - marge; j.vx *= -0.4; }
  if (j.y < marge)           { j.y = marge;           j.vy *= -0.4; }
  if (j.y > HAUTEUR - marge) { j.y = HAUTEUR - marge; j.vy *= -0.4; }
}

/* =========================================================
   PHYSIQUE DE LA RONDELLE
========================================================= */
function bougerRondelle(r) {
  if (r.proprietaire) {
    const p = r.proprietaire;
    r.x = p.x + Math.cos(p.angle) * (p.rayon + 14);
    r.y = p.y + Math.sin(p.angle) * (p.rayon + 14);
    r.vx = 0;
    r.vy = 0;
    return;
  }

  r.vx *= r.friction;
  r.vy *= r.friction;
  r.x += r.vx;
  r.y += r.vy;

  const marge = r.rayon + 5;
  if (r.x < marge)           { r.x = marge;           r.vx *= -0.75; }
  if (r.x > LARGEUR - marge) { r.x = LARGEUR - marge; r.vx *= -0.75; }
  if (r.y < marge)           { r.y = marge;           r.vy *= -0.75; }
  if (r.y > HAUTEUR - marge) { r.y = HAUTEUR - marge; r.vy *= -0.75; }
}

/* =========================================================
   DÉTECTION DES BUTS (nouveau!)
   Un but = la rondelle traverse la ligne de but À L'INTÉRIEUR
   de l'ouverture du filet (entre FILET_HAUT et FILET_BAS).
========================================================= */
function verifierBut() {
  const r = rondelle;
  if (r.proprietaire) return;        // pas de but en transportant la rondelle
  if (partie.pauseBut > 0) return;   // déjà en célébration

  const dansOuverture = r.y > FILET_HAUT && r.y < FILET_BAS;

  // But dans le filet de DROITE → point pour BLEU (toi!)
  if (dansOuverture && r.x > LIGNE_BUT_D + r.rayon) {
    partie.scoreBleu++;
    declencherBut('BUT! 🚨');
  }
  // But dans le filet de GAUCHE → point pour ROUGE
  // (pour l'instant c'est un but dans TON filet — l'IA arrive à l'étape 4!)
  else if (dansOuverture && r.x < LIGNE_BUT_G - r.rayon) {
    partie.scoreRouge++;
    declencherBut('BUT ROUGE...');
  }
}

function declencherBut(texte) {
  partie.texteBut = texte;
  partie.pauseBut = 110;     // ~2 secondes de célébration (110 images)
  mettreAJourPointage();
}

/* Met à jour les chiffres du tableau HTML au-dessus du canvas */
function mettreAJourPointage() {
  document.getElementById('scoreBleu').textContent = partie.scoreBleu;
  document.getElementById('scoreRouge').textContent = partie.scoreRouge;
}

/* ===== LA MISE AU JEU (nouveau!) =====
   Après un but : tout le monde retourne à sa place,
   la rondelle au centre, et on repart. */
function miseAuJeu() {
  rondelle.x = CENTRE_X;
  rondelle.y = CENTRE_Y;
  rondelle.vx = 0;
  rondelle.vy = 0;
  rondelle.proprietaire = null;

  joueur.x = CENTRE_X - 100;
  joueur.y = CENTRE_Y;
  joueur.vx = 0;
  joueur.vy = 0;
  joueur.angle = 0;
  joueur.aLaRondelle = false;

  delaiReprise = 0;
}

/* =========================================================
   POSSESSION ET LANCER
========================================================= */
function verifierPossession() {
  if (rondelle.proprietaire) return;
  if (delaiReprise > 0) return;

  const dist = Math.hypot(joueur.x - rondelle.x, joueur.y - rondelle.y);
  if (dist < joueur.rayon + rondelle.rayon + 8) {
    rondelle.proprietaire = joueur;
    joueur.aLaRondelle = true;
  }
}

function verifierLancer() {
  if (!touches[' ']) return;
  if (rondelle.proprietaire !== joueur) return;

  const FORCE_LANCER = 9;
  rondelle.vx = Math.cos(joueur.angle) * FORCE_LANCER + joueur.vx * 0.5;
  rondelle.vy = Math.sin(joueur.angle) * FORCE_LANCER + joueur.vy * 0.5;

  rondelle.proprietaire = null;
  joueur.aLaRondelle = false;
  delaiReprise = 20;
}

/* =========================================================
   LA BOUCLE DE JEU
========================================================= */
function boucle() {
  /* Pendant la célébration d'un but, le jeu est "gelé" :
     on décompte la pause, et à zéro → mise au jeu. */
  if (partie.pauseBut > 0) {
    partie.pauseBut--;
    if (partie.pauseBut === 0) {
      miseAuJeu();
    }
  } else {
    // Jeu normal
    bougerJoueur(joueur);
    verifierLancer();
    verifierPossession();
    bougerRondelle(rondelle);
    verifierBut();
    if (delaiReprise > 0) delaiReprise--;
  }

  // Dessin (toujours, même pendant la pause)
  ctx.clearRect(0, 0, LARGEUR, HAUTEUR);
  dessinerPatinoire();
  dessinerFilets();
  dessinerRondelle(rondelle);
  dessinerJoueur(joueur);
  dessinerMessageBut();

  requestAnimationFrame(boucle);
}

boucle();
</script>
</body>
</html>
