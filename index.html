<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hockey Arcade — Étape 2</title>
<style>
  /* ===== MISE EN PAGE DE BASE ===== */
  body {
    margin: 0;
    background: #1a2634;            /* fond foncé style aréna */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #e8eef4;
  }
  h1 {
    font-size: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 10px 0 4px;
  }
  #infos {
    font-size: 13px;
    color: #9db2c7;
    margin-bottom: 10px;
  }
  canvas {
    max-width: 96vw;
    height: auto;
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

<h1>Hockey Arcade</h1>
<div id="infos">Patine avec <b>WASD</b> ou les <b>flèches</b> — Lance avec <b>ESPACE</b></div>
<canvas id="glace" width="940" height="400"></canvas>

<script>
/* =========================================================
   ÉTAPE 2 : LA RONDELLE
   =========================================================
   Nouveautés par rapport à l'étape 1 :
   1) Un objet "rondelle" avec sa propre physique (glisse + rebonds)
   2) La POSSESSION : toucher la rondelle = la ramasser,
      elle te suit au bout du bâton
   3) Le LANCER : barre d'espace = la rondelle part dans la
      direction où tu regardes, boostée par ta vitesse de patin
========================================================= */

const canvas = document.getElementById('glace');
const ctx = canvas.getContext('2d');

const LARGEUR = canvas.width;    // 940 px = 200 pieds
const HAUTEUR = canvas.height;   // 400 px = 85 pieds
const ECHELLE = LARGEUR / 200;

/* ===== LE JOUEUR ===== */
const joueur = {
  x: LARGEUR / 2 - 100,
  y: HAUTEUR / 2,
  vx: 0,
  vy: 0,
  angle: 0,
  rayon: 13,
  accel: 0.35,
  friction: 0.94,
  vitesseMax: 5.2,
  aLaRondelle: false     // NOUVEAU : est-ce que je transporte la rondelle?
};

/* ===== LA RONDELLE (nouveau!) =====
   Même principe que le joueur : position + vitesse + friction.
   Mais sa friction est plus haute (0.985) : une rondelle glisse
   BEAUCOUP plus longtemps qu'un patineur qui freine. */
const rondelle = {
  x: LARGEUR / 2,          // départ au centre, comme une mise au jeu
  y: HAUTEUR / 2,
  vx: 0,
  vy: 0,
  rayon: 6,
  friction: 0.985,
  proprietaire: null       // null = libre, sinon = le joueur qui l'a
};

/* Petit "délai de grâce" après un lancer : pendant quelques images,
   le lanceur peut PAS reprendre la rondelle. Sans ça, tu lances pis
   tu la re-ramasses instantanément parce qu'elle est encore collée
   sur toi! (Un bug classique de jeu vidéo.) */
let delaiReprise = 0;

/* ===== LE CLAVIER ===== */
const touches = {};
window.addEventListener('keydown', e => {
  touches[e.key.toLowerCase()] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => {
  touches[e.key.toLowerCase()] = false;
});

/* =========================================================
   DESSINER LA PATINOIRE (identique à l'étape 1)
========================================================= */
const RAYON_COIN = 28 * ECHELLE;
const LIGNE_BUT_G = 11 * ECHELLE;
const LIGNE_BUT_D = LARGEUR - LIGNE_BUT_G;
const LIGNE_BLEUE_G = 75 * ECHELLE;
const LIGNE_BLEUE_D = LARGEUR - LIGNE_BLEUE_G;
const CENTRE_X = LARGEUR / 2;
const CENTRE_Y = HAUTEUR / 2;

function dessinerPatinoire() {
  ctx.save();
  tracerContourPatinoire();
  ctx.fillStyle = '#eef6fb';
  ctx.fill();
  ctx.clip();

  ctx.fillStyle = '#1560bd';
  ctx.fillRect(LIGNE_BLEUE_G - 3, 0, 6, HAUTEUR);
  ctx.fillRect(LIGNE_BLEUE_D - 3, 0, 6, HAUTEUR);

  ctx.fillStyle = '#d62828';
  ctx.fillRect(CENTRE_X - 3, 0, 6, HAUTEUR);
  ctx.fillRect(LIGNE_BUT_G - 1, 0, 2, HAUTEUR);
  ctx.fillRect(LIGNE_BUT_D - 1, 0, 2, HAUTEUR);

  ctx.strokeStyle = '#1560bd';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(CENTRE_X, CENTRE_Y, 15 * ECHELLE, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = '#1560bd';
  ctx.beginPath();
  ctx.arc(CENTRE_X, CENTRE_Y, 4, 0, Math.PI * 2);
  ctx.fill();

  const cercleX_G = LIGNE_BUT_G + 20 * ECHELLE;
  const cercleX_D = LIGNE_BUT_D - 20 * ECHELLE;
  const cercleY_H = CENTRE_Y - 22 * ECHELLE;
  const cercleY_B = CENTRE_Y + 22 * ECHELLE;
  ctx.strokeStyle = '#d62828';
  for (const cx of [cercleX_G, cercleX_D]) {
    for (const cy of [cercleY_H, cercleY_B]) {
      ctx.beginPath();
      ctx.arc(cx, cy, 15 * ECHELLE, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = '#d62828';
      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.fillStyle = 'rgba(100, 180, 235, 0.45)';
  ctx.strokeStyle = '#d62828';
  ctx.beginPath();
  ctx.arc(LIGNE_BUT_G, CENTRE_Y, 6 * ECHELLE, -Math.PI / 2, Math.PI / 2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.arc(LIGNE_BUT_D, CENTRE_Y, 6 * ECHELLE, Math.PI / 2, Math.PI * 1.5);
  ctx.fill(); ctx.stroke();

  ctx.restore();

  tracerContourPatinoire();
  ctx.strokeStyle = '#33475e';
  ctx.lineWidth = 5;
  ctx.stroke();
}

function tracerContourPatinoire() {
  ctx.beginPath();
  ctx.roundRect(2, 2, LARGEUR - 4, HAUTEUR - 4, RAYON_COIN);
}

/* =========================================================
   DESSINER LE JOUEUR (identique à l'étape 1)
========================================================= */
function dessinerJoueur(j) {
  const boutX = j.x + Math.cos(j.angle) * (j.rayon + 12);
  const boutY = j.y + Math.sin(j.angle) * (j.rayon + 12);
  ctx.strokeStyle = '#8a5a2b';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(j.x, j.y);
  ctx.lineTo(boutX, boutY);
  ctx.stroke();

  ctx.fillStyle = '#1560bd';
  ctx.strokeStyle = '#0d3d7a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(j.x, j.y, j.rayon, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 12px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('9', j.x, j.y + 1);
}

/* ===== DESSINER LA RONDELLE (nouveau!) ===== */
function dessinerRondelle(r) {
  ctx.fillStyle = '#111111';
  ctx.beginPath();
  ctx.arc(r.x, r.y, r.rayon, 0, Math.PI * 2);
  ctx.fill();
  // Petit reflet pour le style
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.arc(r.x - 2, r.y - 2, 2, 0, Math.PI * 2);
  ctx.fill();
}

/* =========================================================
   LA PHYSIQUE DU PATINAGE (identique à l'étape 1)
========================================================= */
function bougerJoueur(j) {
  let pousseeX = 0, pousseeY = 0;
  if (touches['w'] || touches['arrowup'])    pousseeY -= 1;
  if (touches['s'] || touches['arrowdown'])  pousseeY += 1;
  if (touches['a'] || touches['arrowleft'])  pousseeX -= 1;
  if (touches['d'] || touches['arrowright']) pousseeX += 1;

  if (pousseeX !== 0 && pousseeY !== 0) {
    pousseeX *= 0.707;
    pousseeY *= 0.707;
  }

  j.vx += pousseeX * j.accel;
  j.vy += pousseeY * j.accel;
  j.vx *= j.friction;
  j.vy *= j.friction;

  const vitesse = Math.hypot(j.vx, j.vy);
  if (vitesse > j.vitesseMax) {
    j.vx = (j.vx / vitesse) * j.vitesseMax;
    j.vy = (j.vy / vitesse) * j.vitesseMax;
  }

  j.x += j.vx;
  j.y += j.vy;

  if (vitesse > 0.5) {
    j.angle = Math.atan2(j.vy, j.vx);
  }

  const marge = j.rayon + 5;
  if (j.x < marge)           { j.x = marge;           j.vx *= -0.4; }
  if (j.x > LARGEUR - marge) { j.x = LARGEUR - marge; j.vx *= -0.4; }
  if (j.y < marge)           { j.y = marge;           j.vy *= -0.4; }
  if (j.y > HAUTEUR - marge) { j.y = HAUTEUR - marge; j.vy *= -0.4; }
}

/* =========================================================
   LA PHYSIQUE DE LA RONDELLE (nouveau!)
========================================================= */
function bougerRondelle(r) {
  /* CAS 1 : quelqu'un transporte la rondelle.
     Elle suit son propriétaire au bout du bâton — pas de physique,
     on la "colle" à la bonne position à chaque image. */
  if (r.proprietaire) {
    const p = r.proprietaire;
    r.x = p.x + Math.cos(p.angle) * (p.rayon + 14);
    r.y = p.y + Math.sin(p.angle) * (p.rayon + 14);
    r.vx = 0;
    r.vy = 0;
    return;   // rien d'autre à faire, on sort de la fonction
  }

  /* CAS 2 : la rondelle est libre. Physique normale :
     elle glisse (friction) et rebondit sur les bandes. */
  r.vx *= r.friction;
  r.vy *= r.friction;
  r.x += r.vx;
  r.y += r.vy;

  // Rebonds sur les bandes — plus élastiques que le joueur (0.75) :
  // une rondelle, ça REBONDIT pour vrai sur la bande!
  const marge = r.rayon + 5;
  if (r.x < marge)           { r.x = marge;           r.vx *= -0.75; }
  if (r.x > LARGEUR - marge) { r.x = LARGEUR - marge; r.vx *= -0.75; }
  if (r.y < marge)           { r.y = marge;           r.vy *= -0.75; }
  if (r.y > HAUTEUR - marge) { r.y = HAUTEUR - marge; r.vy *= -0.75; }
}

/* =========================================================
   RAMASSER LA RONDELLE (nouveau!)
   À chaque image, on vérifie : est-ce que le joueur touche
   la rondelle libre? Si oui → il la prend.
========================================================= */
function verifierPossession() {
  if (rondelle.proprietaire) return;      // déjà prise, rien à faire
  if (delaiReprise > 0) return;           // délai de grâce après un lancer

  // Distance entre le centre du joueur et le centre de la rondelle
  const dist = Math.hypot(joueur.x - rondelle.x, joueur.y - rondelle.y);

  // Deux cercles se touchent quand la distance entre leurs centres
  // est plus petite que la somme de leurs rayons (+ petite marge
  // pour être généreux : ramasser doit être FACILE, pas frustrant)
  if (dist < joueur.rayon + rondelle.rayon + 8) {
    rondelle.proprietaire = joueur;
    joueur.aLaRondelle = true;
  }
}

/* =========================================================
   LE LANCER (nouveau!)
   Barre d'espace = la rondelle part dans la direction du regard.
========================================================= */
function verifierLancer() {
  if (!touches[' ']) return;                    // espace pas enfoncée
  if (rondelle.proprietaire !== joueur) return; // on a pas la rondelle

  const FORCE_LANCER = 9;

  // La rondelle part dans la direction du regard du joueur...
  rondelle.vx = Math.cos(joueur.angle) * FORCE_LANCER;
  rondelle.vy = Math.sin(joueur.angle) * FORCE_LANCER;

  // ...PLUS la moitié de ta vitesse de patin. Lancer en pleine
  // montée = tir plus puissant. Réaliste et satisfaisant!
  rondelle.vx += joueur.vx * 0.5;
  rondelle.vy += joueur.vy * 0.5;

  // On libère la rondelle et on part le délai de grâce
  rondelle.proprietaire = null;
  joueur.aLaRondelle = false;
  delaiReprise = 20;   // 20 images ≈ un tiers de seconde
}

/* =========================================================
   LA BOUCLE DE JEU
========================================================= */
function boucle() {
  // --- Mise à jour de la logique ---
  bougerJoueur(joueur);
  verifierLancer();        // AVANT verifierPossession, sinon on
  verifierPossession();    // pourrait reprendre la rondelle direct
  bougerRondelle(rondelle);
  if (delaiReprise > 0) delaiReprise--;   // le compte à rebours descend

  // --- Dessin ---
  ctx.clearRect(0, 0, LARGEUR, HAUTEUR);
  dessinerPatinoire();
  dessinerRondelle(rondelle);   // rondelle dessinée AVANT le joueur :
  dessinerJoueur(joueur);       // le joueur passe "par-dessus" elle

  requestAnimationFrame(boucle);
}

boucle();
</script>
</body>
</html>
