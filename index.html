<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hockey Arcade — v1.2</title>
<style>
  /* ===== MISE EN PAGE DE BASE ===== */
  body {
    margin: 0;
    background: radial-gradient(ellipse at 50% 30%, #24354a 0%, #141e2a 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #e8eef4;
  }
  h1 {
    font-size: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 10px 0 4px;
  }
  #infos {
    font-size: 13px;
    color: #9db2c7;
    margin-bottom: 10px;
  }

  /* ===== TABLEAU DE POINTAGE ===== */
  #pointage {
    display: flex;
    align-items: center;
    gap: 22px;
    background: linear-gradient(180deg, #16222f, #0d1620);
    border: 2px solid #33475e;
    border-radius: 8px;
    padding: 8px 24px;
    margin-bottom: 12px;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 1px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }
  .equipe-bleu { color: #4d9fff; }
  .equipe-rouge { color: #ff5a5a; }

  #horloge {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.1;
  }
  #periodeAffichee {
    font-size: 12px;
    color: #7d93a8;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #tempsAffiche {
    font-size: 26px;
    color: #ffd166;
    font-variant-numeric: tabular-nums;
  }

  /* ===== ZONE DE JEU ===== */
  #zoneJeu {
    position: relative;
    max-width: 96vw;
  }
  canvas {
    display: block;
    max-width: 96vw;
    height: auto;
    border-radius: 10px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.6);
  }

  /* ===== LES COUCHES (menu + fin de partie) ===== */
  .couche {
    position: absolute;
    inset: 0;
    background: rgba(13, 22, 32, 0.92);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .couche h2 {
    font-size: 32px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin: 0 0 4px;
    color: #ffd166;
  }
  .couche button {
    font-family: inherit;
    font-size: 17px;
    font-weight: bold;
    letter-spacing: 1px;
    padding: 12px 34px;
    min-width: 260px;
    border-radius: 8px;
    border: 2px solid #4d9fff;
    background: #14263d;
    color: #e8eef4;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .couche button:hover:not(:disabled) {
    background: #1d3a5c;
    transform: scale(1.04);
  }
  .couche button:disabled {
    border-color: #3a4a5c;
    color: #6b7d8f;
    cursor: not-allowed;
  }
  .couche .note {
    font-size: 12px;
    color: #7d93a8;
    margin-top: 4px;
  }

  .rangeeOptions {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 14px;
    color: #9db2c7;
  }
  .rangeeOptions button {
    min-width: 0;
    padding: 6px 14px;
    font-size: 14px;
    border-color: #3a4a5c;
  }
  .rangeeOptions button.actif {
    border-color: #ffd166;
    color: #ffd166;
  }

  #resultatFinal {
    font-size: 44px;
    font-weight: bold;
  }
  .cache { display: none !important; }
</style>
</head>
<body>

<h1>Hockey Arcade</h1>
<div id="infos"><b>WASD</b>/<b>flèches</b> pour patiner — <b>ESPACE</b> pour lancer — <b>Échap</b> pour le menu</div>

<div id="pointage">
  <span class="equipe-bleu">BLEU <span id="scoreBleu">0</span></span>
  <span id="horloge">
    <span id="periodeAffichee">1re période</span>
    <span id="tempsAffiche">2:00</span>
  </span>
  <span class="equipe-rouge"><span id="scoreRouge">0</span> ROUGE</span>
</div>

<div id="zoneJeu">
  <canvas id="glace" width="940" height="400"></canvas>

  <div id="menu" class="couche">
    <h2>🏒 Hockey Arcade</h2>
    <div class="rangeeOptions" id="choixDuree">
      Périodes :
      <button data-duree="60">1 min</button>
      <button data-duree="120" class="actif">2 min</button>
      <button data-duree="180">3 min</button>
    </div>
    <div class="rangeeOptions" id="choixNiveau">
      Adversaire :
      <button data-niveau="rookie">🐣 Rookie</button>
      <button data-niveau="pro" class="actif">🏒 Pro</button>
      <button data-niveau="allstar">⭐ All-Star</button>
    </div>
    <button id="btnSolo">1 joueur — contre l'IA</button>
    <button disabled>2 joueurs — même clavier (bientôt)</button>
    <button disabled>En ligne (bientôt)</button>
    <div class="note">3 périodes + prolongation en cas d'égalité. Bonne chance!</div>
  </div>

  <div id="finPartie" class="couche cache">
    <h2>Fin de la partie</h2>
    <div id="resultatFinal"></div>
    <button id="btnRejouer">Rejouer</button>
    <button id="btnRetourMenu">Retour au menu</button>
  </div>
</div>

<script>
/* =========================================================
   v1.2 : LA REFONTE VISUELLE
   =========================================================
   Le gameplay change PAS. Ce qui change :
   1) Les joueurs : épaules, casque, bâton avec palette,
      le corps TOURNE dans la direction du patinage
   2) La glace : texture de marques de patins (dessinée UNE
      fois dans un canvas caché — technique pro!), reflet
   3) Les bandes : deux tons + plaque jaune comme aux vrais arénas
   4) Détails NHL : marques de hachures aux cercles, points de
      mise au jeu en zone neutre, trapèze derrière les filets
   5) La lumière de but ROUGE qui flash quand ça compte
   6) Une traînée derrière la rondelle sur les gros lancers
   7) Des ombres sous tout le monde
========================================================= */

const canvas = document.getElementById('glace');
const ctx = canvas.getContext('2d');

const LARGEUR = canvas.width;
const HAUTEUR = canvas.height;
const ECHELLE = LARGEUR / 200;

/* ===== MESURES DE LA PATINOIRE ===== */
const RAYON_COIN = 28 * ECHELLE;
const LIGNE_BUT_G = 11 * ECHELLE;
const LIGNE_BUT_D = LARGEUR - LIGNE_BUT_G;
const LIGNE_BLEUE_G = 75 * ECHELLE;
const LIGNE_BLEUE_D = LARGEUR - LIGNE_BLEUE_G;
const CENTRE_X = LARGEUR / 2;
const CENTRE_Y = HAUTEUR / 2;

/* ===== LES FILETS ===== */
const DEMI_OUVERTURE = 3 * ECHELLE;
const PROFONDEUR_FILET = 3.3 * ECHELLE;
const FILET_HAUT = CENTRE_Y - DEMI_OUVERTURE;
const FILET_BAS  = CENTRE_Y + DEMI_OUVERTURE;

/* ===== LES NIVEAUX DE DIFFICULTÉ ===== */
const NIVEAUX = {
  rookie: {
    nom: 'Rookie', vitesseMax: 4.2, accel: 0.26,
    imprecision: 4.2, distanceTir: 110, anticipation: 0
  },
  pro: {
    nom: 'Pro', vitesseMax: 4.9, accel: 0.32,
    imprecision: 2.4, distanceTir: 150, anticipation: 8
  },
  allstar: {
    nom: 'All-Star', vitesseMax: 5.3, accel: 0.37,
    imprecision: 1.1, distanceTir: 190, anticipation: 18
  }
};

let niveauChoisi = 'pro';

/* ===== L'ÉTAT DU JEU ===== */
let etat = 'menu';

const partie = {
  scoreBleu: 0,
  scoreRouge: 0,
  pauseBut: 0,
  texteBut: '',
  apresPause: 'miseAuJeu',
  periode: 1,
  dureePeriode: 120,
  tempsRestant: 120,
  prolongation: false,
  lumiereBut: null      // 'gauche' ou 'droit' : quel filet allumer
};

/* ===== LES JOUEURS ===== */
function creerJoueur(options) {
  return {
    x: options.x,
    y: options.y,
    departX: options.x,
    departY: options.y,
    vx: 0,
    vy: 0,
    angle: options.angle,
    rayon: 13,
    accel: options.accel,
    friction: 0.94,
    vitesseMax: options.vitesseMax,
    couleur: options.couleur,
    couleurFonce: options.couleurFonce,
    casque: options.casque,
    numero: options.numero,
    estIA: options.estIA,
    delaiReprise: 0
  };
}

const joueurBleu = creerJoueur({
  x: CENTRE_X - 100, y: CENTRE_Y, angle: 0,
  accel: 0.35, vitesseMax: 5.2,
  couleur: '#1560bd', couleurFonce: '#0d3d7a', casque: '#0a2f5c',
  numero: '9', estIA: false
});

const joueurRouge = creerJoueur({
  x: CENTRE_X + 100, y: CENTRE_Y, angle: Math.PI,
  accel: 0.32, vitesseMax: 4.9,
  couleur: '#c1272d', couleurFonce: '#7a1418', casque: '#5c0a0d',
  numero: '4', estIA: true
});

const lesJoueurs = [joueurBleu, joueurRouge];

function appliquerNiveau(nomNiveau) {
  const n = NIVEAUX[nomNiveau];
  joueurRouge.vitesseMax = n.vitesseMax;
  joueurRouge.accel = n.accel;
  joueurRouge.niveau = n;
}

/* ===== LA RONDELLE ===== */
const rondelle = {
  x: CENTRE_X,
  y: CENTRE_Y,
  vx: 0,
  vy: 0,
  rayon: 6,
  friction: 0.985,
  proprietaire: null,
  trainee: []          // NOUVEAU : les dernières positions, pour l'effet de vitesse
};

/* ===== LE CLAVIER ===== */
const touches = {};
window.addEventListener('keydown', e => {
  touches[e.key.toLowerCase()] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }
  if (e.key === 'Escape' && etat === 'jeu') {
    ouvrirMenu();
  }
});
window.addEventListener('keyup', e => {
  touches[e.key.toLowerCase()] = false;
});

/* =========================================================
   LES ÉCRANS : MENU ET FIN DE PARTIE
========================================================= */
const menuDiv = document.getElementById('menu');
const finDiv = document.getElementById('finPartie');

document.querySelectorAll('#choixDuree button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#choixDuree button').forEach(b => b.classList.remove('actif'));
    btn.classList.add('actif');
    partie.dureePeriode = parseInt(btn.dataset.duree);
  });
});

document.querySelectorAll('#choixNiveau button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#choixNiveau button').forEach(b => b.classList.remove('actif'));
    btn.classList.add('actif');
    niveauChoisi = btn.dataset.niveau;
  });
});

document.getElementById('btnSolo').addEventListener('click', demarrerPartie);
document.getElementById('btnRejouer').addEventListener('click', demarrerPartie);
document.getElementById('btnRetourMenu').addEventListener('click', () => {
  finDiv.classList.add('cache');
  ouvrirMenu();
});

function demarrerPartie() {
  appliquerNiveau(niveauChoisi);
  partie.scoreBleu = 0;
  partie.scoreRouge = 0;
  partie.periode = 1;
  partie.tempsRestant = partie.dureePeriode;
  partie.prolongation = false;
  partie.pauseBut = 0;
  partie.lumiereBut = null;
  mettreAJourPointage();
  mettreAJourHorloge();
  miseAuJeu();
  menuDiv.classList.add('cache');
  finDiv.classList.add('cache');
  etat = 'jeu';
}

function ouvrirMenu() {
  etat = 'menu';
  menuDiv.classList.remove('cache');
}

/* =========================================================
   LA TEXTURE DE GLACE (nouveau — technique pro!)
   Dessiner 60 marques de patins 60 fois par seconde = gaspillage.
   La solution : on les dessine UNE SEULE fois dans un canvas
   CACHÉ (jamais affiché), puis à chaque image on colle ce
   canvas-là d'un coup, comme un autocollant. Ça s'appelle du
   "pré-rendu" et tous les vrais jeux font ça.
========================================================= */
const textureGlace = document.createElement('canvas');
textureGlace.width = LARGEUR;
textureGlace.height = HAUTEUR;

function preparerTextureGlace() {
  const t = textureGlace.getContext('2d');

  // Marques de patins : des petits arcs pâles, au hasard
  t.strokeStyle = 'rgba(150, 175, 200, 0.14)';
  t.lineWidth = 1;
  for (let i = 0; i < 90; i++) {
    const x = Math.random() * LARGEUR;
    const y = Math.random() * HAUTEUR;
    const longueur = 15 + Math.random() * 45;
    const angle = Math.random() * Math.PI * 2;
    const courbe = (Math.random() - 0.5) * 20;
    t.beginPath();
    t.moveTo(x, y);
    t.quadraticCurveTo(
      x + Math.cos(angle) * longueur / 2 + courbe,
      y + Math.sin(angle) * longueur / 2,
      x + Math.cos(angle) * longueur,
      y + Math.sin(angle) * longueur
    );
    t.stroke();
  }

  // Le reflet des lumières de l'aréna : un grand halo doux
  const reflet = t.createRadialGradient(
    CENTRE_X, CENTRE_Y - 60, 40,
    CENTRE_X, CENTRE_Y, LARGEUR * 0.6
  );
  reflet.addColorStop(0, 'rgba(255, 255, 255, 0.16)');
  reflet.addColorStop(1, 'rgba(255, 255, 255, 0)');
  t.fillStyle = reflet;
  t.fillRect(0, 0, LARGEUR, HAUTEUR);
}
preparerTextureGlace();   // une seule fois, au chargement!

/* =========================================================
   DESSINER LA PATINOIRE
========================================================= */
function dessinerPatinoire() {
  ctx.save();
  tracerContourPatinoire();

  // La glace : un dégradé subtil au lieu d'une couleur plate
  const glace = ctx.createLinearGradient(0, 0, 0, HAUTEUR);
  glace.addColorStop(0, '#f4fafd');
  glace.addColorStop(0.5, '#e8f2f9');
  glace.addColorStop(1, '#dcebf5');
  ctx.fillStyle = glace;
  ctx.fill();
  ctx.clip();

  /* --- Le trapèze derrière les filets (zone du gardien) --- */
  ctx.strokeStyle = 'rgba(214, 40, 40, 0.55)';
  ctx.lineWidth = 2;
  for (const [ligneX, dir] of [[LIGNE_BUT_G, -1], [LIGNE_BUT_D, 1]]) {
    ctx.beginPath();
    ctx.moveTo(ligneX, CENTRE_Y - 11 * ECHELLE);
    ctx.lineTo(ligneX + dir * LIGNE_BUT_G, CENTRE_Y - 14 * ECHELLE);
    ctx.moveTo(ligneX, CENTRE_Y + 11 * ECHELLE);
    ctx.lineTo(ligneX + dir * LIGNE_BUT_G, CENTRE_Y + 14 * ECHELLE);
    ctx.stroke();
  }

  /* --- Lignes bleues --- */
  ctx.fillStyle = '#1560bd';
  ctx.fillRect(LIGNE_BLEUE_G - 3, 0, 6, HAUTEUR);
  ctx.fillRect(LIGNE_BLEUE_D - 3, 0, 6, HAUTEUR);

  /* --- Ligne rouge centrale (avec le pointillé blanc NHL!) --- */
  ctx.fillStyle = '#d62828';
  ctx.fillRect(CENTRE_X - 3, 0, 6, HAUTEUR);
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([7, 9]);          // la ligne devient pointillée
  ctx.beginPath();
  ctx.moveTo(CENTRE_X, 0);
  ctx.lineTo(CENTRE_X, HAUTEUR);
  ctx.stroke();
  ctx.setLineDash([]);              // IMPORTANT : on remet en ligne pleine

  /* --- Lignes de but --- */
  ctx.fillStyle = '#d62828';
  ctx.fillRect(LIGNE_BUT_G - 1, 0, 2, HAUTEUR);
  ctx.fillRect(LIGNE_BUT_D - 1, 0, 2, HAUTEUR);

  /* --- Cercle central + logo --- */
  ctx.strokeStyle = '#1560bd';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(CENTRE_X, CENTRE_Y, 15 * ECHELLE, 0, Math.PI * 2);
  ctx.stroke();
  // Le logo au centre de la glace, très pâle (comme un vrai aréna)
  ctx.fillStyle = 'rgba(21, 96, 189, 0.18)';
  ctx.font = 'bold 44px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('HA', CENTRE_X, CENTRE_Y);
  ctx.fillStyle = '#1560bd';
  ctx.beginPath();
  ctx.arc(CENTRE_X, CENTRE_Y, 4, 0, Math.PI * 2);
  ctx.fill();

  /* --- Cercles de mise au jeu + hachures --- */
  const cercleX_G = LIGNE_BUT_G + 20 * ECHELLE;
  const cercleX_D = LIGNE_BUT_D - 20 * ECHELLE;
  const cercleY_H = CENTRE_Y - 22 * ECHELLE;
  const cercleY_B = CENTRE_Y + 22 * ECHELLE;
  const R_CERCLE = 15 * ECHELLE;
  for (const cx of [cercleX_G, cercleX_D]) {
    for (const cy of [cercleY_H, cercleY_B]) {
      ctx.strokeStyle = '#d62828';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, R_CERCLE, 0, Math.PI * 2);
      ctx.stroke();
      // Les hachures : les petites lignes en haut et en bas du cercle
      for (const cote of [-1, 1]) {
        for (const dx of [-8, 8]) {
          ctx.beginPath();
          ctx.moveTo(cx + dx, cy + cote * R_CERCLE);
          ctx.lineTo(cx + dx, cy + cote * (R_CERCLE + 7));
          ctx.stroke();
        }
      }
      ctx.fillStyle = '#d62828';
      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  /* --- Points de mise au jeu en zone neutre (4 petits points) --- */
  ctx.fillStyle = '#d62828';
  for (const px of [LIGNE_BLEUE_G + 5 * ECHELLE, LIGNE_BLEUE_D - 5 * ECHELLE]) {
    for (const py of [cercleY_H, cercleY_B]) {
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  /* --- Demi-cercles des gardiens --- */
  ctx.fillStyle = 'rgba(100, 180, 235, 0.5)';
  ctx.strokeStyle = '#d62828';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(LIGNE_BUT_G, CENTRE_Y, 6 * ECHELLE, -Math.PI / 2, Math.PI / 2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.arc(LIGNE_BUT_D, CENTRE_Y, 6 * ECHELLE, Math.PI / 2, Math.PI * 1.5);
  ctx.fill(); ctx.stroke();

  /* --- La texture pré-rendue : marques de patins + reflet --- */
  ctx.drawImage(textureGlace, 0, 0);

  ctx.restore();

  /* --- Les bandes : deux tons + la plaque jaune du bas --- */
  // La plaque jaune (juste à l'intérieur des bandes)
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(5, 5, LARGEUR - 10, HAUTEUR - 10, RAYON_COIN - 3);
  ctx.strokeStyle = '#e8c547';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.restore();
  // La bande blanche
  tracerContourPatinoire();
  ctx.strokeStyle = '#f5f7fa';
  ctx.lineWidth = 5;
  ctx.stroke();
  // Le contour foncé extérieur (la vitre!)
  ctx.beginPath();
  ctx.roundRect(0.5, 0.5, LARGEUR - 1, HAUTEUR - 1, RAYON_COIN + 2);
  ctx.strokeStyle = '#2a3b50';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function tracerContourPatinoire() {
  ctx.beginPath();
  ctx.roundRect(2, 2, LARGEUR - 4, HAUTEUR - 4, RAYON_COIN);
}

/* ===== LES FILETS ===== */
function dessinerFilets() {
  dessinerUnFilet(LIGNE_BUT_G, -1);
  dessinerUnFilet(LIGNE_BUT_D, +1);
}

function dessinerUnFilet(ligneX, direction) {
  const fondX = ligneX + direction * PROFONDEUR_FILET;

  // Le tissu du filet : quadrillage en DIAGONALE (plus réaliste)
  ctx.fillStyle = 'rgba(225, 232, 238, 0.65)';
  ctx.fillRect(Math.min(ligneX, fondX), FILET_HAUT,
               PROFONDEUR_FILET, DEMI_OUVERTURE * 2);
  ctx.strokeStyle = 'rgba(130, 145, 160, 0.6)';
  ctx.lineWidth = 0.8;
  ctx.save();
  ctx.beginPath();
  ctx.rect(Math.min(ligneX, fondX), FILET_HAUT, PROFONDEUR_FILET, DEMI_OUVERTURE * 2);
  ctx.clip();
  for (let i = -6; i < 8; i++) {
    ctx.beginPath();
    ctx.moveTo(Math.min(ligneX, fondX) + i * 5, FILET_HAUT - 5);
    ctx.lineTo(Math.min(ligneX, fondX) + i * 5 + 20, FILET_BAS + 5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(Math.min(ligneX, fondX) + i * 5 + 20, FILET_HAUT - 5);
    ctx.lineTo(Math.min(ligneX, fondX) + i * 5, FILET_BAS + 5);
    ctx.stroke();
  }
  ctx.restore();

  // Le cadre rouge
  ctx.strokeStyle = '#d62828';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(ligneX, FILET_HAUT);
  ctx.lineTo(fondX, FILET_HAUT);
  ctx.lineTo(fondX, FILET_BAS);
  ctx.lineTo(ligneX, FILET_BAS);
  ctx.stroke();
  ctx.lineCap = 'butt';

  // Les poteaux : deux points rouges bien visibles sur la ligne
  ctx.fillStyle = '#e33b3b';
  for (const py of [FILET_HAUT, FILET_BAS]) {
    ctx.beginPath();
    ctx.arc(ligneX, py, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ===== LA LUMIÈRE DE BUT (nouveau!) =====
   Le classique : quand ça compte, la lumière rouge derrière
   le filet flash. L'intensité "pulse" avec Math.sin. */
function dessinerLumiereBut() {
  if (partie.pauseBut <= 0 || !partie.lumiereBut) return;

  const x = partie.lumiereBut === 'droit' ? LIGNE_BUT_D : LIGNE_BUT_G;
  // Le flash pulse : sin() oscille entre -1 et 1, on le ramène entre 0.25 et 1
  const pulse = 0.62 + Math.sin(partie.pauseBut * 0.45) * 0.38;

  const halo = ctx.createRadialGradient(x, CENTRE_Y, 5, x, CENTRE_Y, 110);
  halo.addColorStop(0, 'rgba(255, 40, 40, ' + (0.55 * pulse) + ')');
  halo.addColorStop(1, 'rgba(255, 40, 40, 0)');
  ctx.fillStyle = halo;
  ctx.fillRect(x - 110, CENTRE_Y - 110, 220, 220);
}

/* =========================================================
   DESSINER LES JOUEURS (refonte complète!)
   Un vrai joueur vu de haut : les ÉPAULES (larges), le CASQUE
   (au centre), et le BÂTON tenu sur le côté avec sa palette.
   Le corps TOURNE avec ctx.rotate() — dans le repère tourné,
   "devant" est toujours +x, ça simplifie tout.
========================================================= */
function dessinerJoueur(j) {
  // L'ombre au sol (dessinée AVANT le joueur, décalée)
  ctx.fillStyle = 'rgba(30, 45, 65, 0.22)';
  ctx.beginPath();
  ctx.ellipse(j.x + 2, j.y + 4, j.rayon + 2, j.rayon - 2, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.translate(j.x, j.y);   // l'origine devient le joueur
  ctx.rotate(j.angle);       // tout ce qui suit tourne avec lui

  // LE BÂTON : part de l'épaule droite, va vers l'avant-droite
  ctx.strokeStyle = '#8a5a2b';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(2, 7);
  ctx.lineTo(j.rayon + 11, 9);
  ctx.stroke();
  // La palette au bout (perpendiculaire au manche)
  ctx.strokeStyle = '#6e4318';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(j.rayon + 9, 11);
  ctx.lineTo(j.rayon + 17, 5);
  ctx.stroke();
  ctx.lineCap = 'butt';

  // LES ÉPAULES : une ellipse LARGE (axe y) et COURTE (axe x).
  // Vu de haut, un joueur est plus large que profond!
  const degrade = ctx.createLinearGradient(0, -j.rayon, 0, j.rayon);
  degrade.addColorStop(0, j.couleur);
  degrade.addColorStop(1, j.couleurFonce);
  ctx.fillStyle = degrade;
  ctx.strokeStyle = j.couleurFonce;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(0, 0, j.rayon * 0.72, j.rayon, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Les bandes de chandail sur les épaules
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.75)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(0, 0, j.rayon * 0.72 - 3, j.rayon - 3, 0, -0.6, 0.6);
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(0, 0, j.rayon * 0.72 - 3, j.rayon - 3, 0, Math.PI - 0.6, Math.PI + 0.6);
  ctx.stroke();

  // LE CASQUE : un cercle plus foncé au centre, avec un reflet
  ctx.fillStyle = j.casque;
  ctx.beginPath();
  ctx.arc(0, 0, 6.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
  ctx.beginPath();
  ctx.arc(1.5, -1.5, 2.5, 0, Math.PI * 2);   // le reflet, vers l'avant
  ctx.fill();

  ctx.restore();   // on revient au repère normal

  // LE NUMÉRO : flotte au-dessus du joueur (dans le repère normal,
  // sinon le chiffre tournerait avec lui — pas lisible!)
  ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
  ctx.strokeStyle = 'rgba(20, 30, 45, 0.8)';
  ctx.lineWidth = 3;
  ctx.font = 'bold 11px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.strokeText(j.numero, j.x, j.y - j.rayon - 8);
  ctx.fillText(j.numero, j.x, j.y - j.rayon - 8);
}

/* ===== LA RONDELLE (avec ombre et traînée!) ===== */
function dessinerRondelle(r) {
  // La traînée : les vieilles positions, de plus en plus pâles.
  // Effet garanti sur un gros lancer!
  for (let i = 0; i < r.trainee.length; i++) {
    const t = r.trainee[i];
    const alpha = (i / r.trainee.length) * 0.3;
    ctx.fillStyle = 'rgba(30, 40, 55, ' + alpha + ')';
    ctx.beginPath();
    ctx.arc(t.x, t.y, r.rayon * (0.5 + 0.5 * i / r.trainee.length), 0, Math.PI * 2);
    ctx.fill();
  }

  // L'ombre
  ctx.fillStyle = 'rgba(30, 45, 65, 0.25)';
  ctx.beginPath();
  ctx.ellipse(r.x + 1.5, r.y + 2.5, r.rayon, r.rayon * 0.7, 0, 0, Math.PI * 2);
  ctx.fill();

  // La rondelle : noir avec un dégradé pour le volume
  const deg = ctx.createRadialGradient(r.x - 2, r.y - 2, 1, r.x, r.y, r.rayon);
  deg.addColorStop(0, '#3a3a3a');
  deg.addColorStop(1, '#0a0a0a');
  ctx.fillStyle = deg;
  ctx.beginPath();
  ctx.arc(r.x, r.y, r.rayon, 0, Math.PI * 2);
  ctx.fill();
}

function dessinerMessage() {
  if (partie.pauseBut <= 0) return;
  ctx.fillStyle = 'rgba(13, 22, 32, 0.55)';
  ctx.fillRect(0, 0, LARGEUR, HAUTEUR);
  ctx.fillStyle = '#ffd166';
  ctx.font = 'bold 52px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(partie.texteBut, CENTRE_X, CENTRE_Y);
}

/* =========================================================
   LA PHYSIQUE COMMUNE
========================================================= */
function appliquerPoussee(j, pousseeX, pousseeY) {
  const longueur = Math.hypot(pousseeX, pousseeY);
  if (longueur > 1) {
    pousseeX /= longueur;
    pousseeY /= longueur;
  }

  j.vx += pousseeX * j.accel;
  j.vy += pousseeY * j.accel;
  j.vx *= j.friction;
  j.vy *= j.friction;

  const vitesse = Math.hypot(j.vx, j.vy);
  if (vitesse > j.vitesseMax) {
    j.vx = (j.vx / vitesse) * j.vitesseMax;
    j.vy = (j.vy / vitesse) * j.vitesseMax;
  }

  j.x += j.vx;
  j.y += j.vy;

  if (vitesse > 0.5) {
    j.angle = Math.atan2(j.vy, j.vx);
  }

  const marge = j.rayon + 5;
  if (j.x < marge)           { j.x = marge;           j.vx *= -0.4; }
  if (j.x > LARGEUR - marge) { j.x = LARGEUR - marge; j.vx *= -0.4; }
  if (j.y < marge)           { j.y = marge;           j.vy *= -0.4; }
  if (j.y > HAUTEUR - marge) { j.y = HAUTEUR - marge; j.vy *= -0.4; }
}

function pousseeClavier() {
  let px = 0, py = 0;
  if (touches['w'] || touches['arrowup'])    py -= 1;
  if (touches['s'] || touches['arrowdown'])  py += 1;
  if (touches['a'] || touches['arrowleft'])  px -= 1;
  if (touches['d'] || touches['arrowright']) px += 1;
  return { px, py };
}

/* =========================================================
   LE CERVEAU DE L'IA
========================================================= */
function cerveauIA(ia) {
  const niveau = ia.niveau;
  let cibleX, cibleY;

  if (rondelle.proprietaire === ia) {
    cibleX = LIGNE_BUT_G;
    cibleY = CENTRE_Y;

    const distFilet = Math.hypot(ia.x - LIGNE_BUT_G, ia.y - CENTRE_Y);
    if (distFilet < niveau.distanceTir) {
      tirerIA(ia);
    }
  } else if (rondelle.proprietaire) {
    const porteur = rondelle.proprietaire;
    cibleX = porteur.x + (LIGNE_BUT_D - porteur.x) * 0.15;
    cibleY = porteur.y + (CENTRE_Y - porteur.y) * 0.15;
  } else {
    cibleX = rondelle.x + rondelle.vx * niveau.anticipation;
    cibleY = rondelle.y + rondelle.vy * niveau.anticipation;
  }

  return {
    px: cibleX - ia.x,
    py: cibleY - ia.y
  };
}

function tirerIA(ia) {
  const FORCE_LANCER = 8.5;
  const imprecision = (Math.random() - 0.5) * (DEMI_OUVERTURE * ia.niveau.imprecision);
  const angle = Math.atan2((CENTRE_Y + imprecision) - ia.y, LIGNE_BUT_G - ia.x);

  rondelle.vx = Math.cos(angle) * FORCE_LANCER + ia.vx * 0.5;
  rondelle.vy = Math.sin(angle) * FORCE_LANCER + ia.vy * 0.5;
  rondelle.proprietaire = null;
  ia.delaiReprise = 20;
}

/* =========================================================
   COLLISIONS ENTRE JOUEURS
========================================================= */
function collisionJoueurs(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const dist = Math.hypot(dx, dy);
  const minDist = a.rayon + b.rayon;

  if (dist >= minDist || dist === 0) return;

  const chevauchement = minDist - dist;
  const nx = dx / dist;
  const ny = dy / dist;
  a.x -= nx * chevauchement / 2;
  a.y -= ny * chevauchement / 2;
  b.x += nx * chevauchement / 2;
  b.y += ny * chevauchement / 2;

  const pousse = 1.5;
  a.vx -= nx * pousse;
  a.vy -= ny * pousse;
  b.vx += nx * pousse;
  b.vy += ny * pousse;

  if (rondelle.proprietaire === a || rondelle.proprietaire === b) {
    const porteur = rondelle.proprietaire;
    rondelle.proprietaire = null;
    rondelle.vx = porteur.vx + (Math.random() - 0.5) * 4;
    rondelle.vy = porteur.vy + (Math.random() - 0.5) * 4;
    porteur.delaiReprise = 25;
  }
}

/* =========================================================
   LA RONDELLE : PHYSIQUE, POSSESSION, LANCER
========================================================= */
function bougerRondelle(r) {
  if (r.proprietaire) {
    const p = r.proprietaire;
    // La rondelle se colle au bout de la PALETTE du bâton,
    // c'est-à-dire devant ET un peu sur le côté du joueur.
    // (13, 9) dans le repère du joueur → converti en coordonnées monde.
    const ca = Math.cos(p.angle);
    const sa = Math.sin(p.angle);
    r.x = p.x + ca * (p.rayon + 13) - sa * 9;
    r.y = p.y + sa * (p.rayon + 13) + ca * 9;
    r.vx = 0;
    r.vy = 0;
    r.trainee.length = 0;    // pas de traînée quand elle est transportée
    return;
  }

  r.vx *= r.friction;
  r.vy *= r.friction;
  r.x += r.vx;
  r.y += r.vy;

  // La traînée : on note la position si ça va vite, sinon on l'efface
  const vitesse = Math.hypot(r.vx, r.vy);
  if (vitesse > 3.5) {
    r.trainee.push({ x: r.x, y: r.y });
    if (r.trainee.length > 8) r.trainee.shift();   // garde les 8 dernières
  } else if (r.trainee.length > 0) {
    r.trainee.shift();   // la traînée s'efface graduellement
  }

  const marge = r.rayon + 5;
  if (r.x < marge)           { r.x = marge;           r.vx *= -0.75; }
  if (r.x > LARGEUR - marge) { r.x = LARGEUR - marge; r.vx *= -0.75; }
  if (r.y < marge)           { r.y = marge;           r.vy *= -0.75; }
  if (r.y > HAUTEUR - marge) { r.y = HAUTEUR - marge; r.vy *= -0.75; }
}

function verifierPossession() {
  if (rondelle.proprietaire) return;

  let gagnant = null;
  let meilleureDist = Infinity;

  for (const j of lesJoueurs) {
    if (j.delaiReprise > 0) continue;
    const dist = Math.hypot(j.x - rondelle.x, j.y - rondelle.y);
    if (dist < j.rayon + rondelle.rayon + 8 && dist < meilleureDist) {
      gagnant = j;
      meilleureDist = dist;
    }
  }

  if (gagnant) {
    rondelle.proprietaire = gagnant;
  }
}

function verifierLancerHumain() {
  if (!touches[' ']) return;
  if (rondelle.proprietaire !== joueurBleu) return;

  const FORCE_LANCER = 9;
  rondelle.vx = Math.cos(joueurBleu.angle) * FORCE_LANCER + joueurBleu.vx * 0.5;
  rondelle.vy = Math.sin(joueurBleu.angle) * FORCE_LANCER + joueurBleu.vy * 0.5;

  rondelle.proprietaire = null;
  joueurBleu.delaiReprise = 20;
}

/* =========================================================
   LE CHRONO
========================================================= */
function avancerChrono() {
  partie.tempsRestant -= 1 / 60;

  if (partie.tempsRestant <= 0) {
    partie.tempsRestant = 0;
    finDePeriode();
  }

  mettreAJourHorloge();
}

function mettreAJourHorloge() {
  const minutes = Math.floor(partie.tempsRestant / 60);
  const secondes = Math.ceil(partie.tempsRestant % 60);
  const s = secondes === 60 ? 0 : secondes;
  const m = secondes === 60 ? minutes + 1 : minutes;
  document.getElementById('tempsAffiche').textContent =
    m + ':' + String(s).padStart(2, '0');

  const noms = ['', '1re période', '2e période', '3e période'];
  document.getElementById('periodeAffichee').textContent =
    partie.prolongation ? 'PROLONGATION' : noms[partie.periode];
}

/* =========================================================
   FIN DE PÉRIODE ET FIN DE PARTIE
========================================================= */
function finDePeriode() {
  if (partie.periode < 3) {
    declencherPause('Fin de la ' + (partie.periode === 1 ? '1re' : '2e') + ' période', 'prochainePeriode');
  } else {
    if (partie.scoreBleu === partie.scoreRouge) {
      partie.prolongation = true;
      declencherPause('PROLONGATION — premier but gagne!', 'miseAuJeu');
    } else {
      finDePartie();
    }
  }
}

function finDePartie() {
  etat = 'fin';

  const resultat = document.getElementById('resultatFinal');
  const nomNiveau = NIVEAUX[niveauChoisi].nom;
  if (partie.scoreBleu > partie.scoreRouge) {
    resultat.textContent = '🏆 Victoire ' + partie.scoreBleu + '-' + partie.scoreRouge + ' contre ' + nomNiveau + '!';
    resultat.style.color = '#4d9fff';
  } else {
    resultat.textContent = nomNiveau + ' gagne ' + partie.scoreRouge + ' à ' + partie.scoreBleu + '...';
    resultat.style.color = '#ff5a5a';
  }

  finDiv.classList.remove('cache');
}

/* =========================================================
   BUTS, POINTAGE, MISE AU JEU
========================================================= */
function verifierBut() {
  const r = rondelle;
  if (r.proprietaire) return;
  if (partie.pauseBut > 0) return;

  const dansOuverture = r.y > FILET_HAUT && r.y < FILET_BAS;

  if (dansOuverture && r.x > LIGNE_BUT_D + r.rayon) {
    partie.scoreBleu++;
    partie.lumiereBut = 'droit';       // allume la lumière du bon bord!
    mettreAJourPointage();
    if (partie.prolongation) {
      declencherPause('BUT EN PROLONGATION! 🚨', 'finDePartie');
    } else {
      declencherPause('BUT! 🚨', 'miseAuJeu');
    }
  } else if (dansOuverture && r.x < LIGNE_BUT_G - r.rayon) {
    partie.scoreRouge++;
    partie.lumiereBut = 'gauche';
    mettreAJourPointage();
    if (partie.prolongation) {
      declencherPause('Rouge compte en prolongation...', 'finDePartie');
    } else {
      declencherPause('BUT DE ROUGE...', 'miseAuJeu');
    }
  }
}

function declencherPause(texte, apres) {
  partie.texteBut = texte;
  partie.pauseBut = 130;
  partie.apresPause = apres;
}

function terminerPause() {
  partie.lumiereBut = null;    // on éteint la lumière de but
  if (partie.apresPause === 'prochainePeriode') {
    partie.periode++;
    partie.tempsRestant = partie.dureePeriode;
    miseAuJeu();
    mettreAJourHorloge();
  } else if (partie.apresPause === 'finDePartie') {
    finDePartie();
  } else {
    miseAuJeu();
  }
}

function mettreAJourPointage() {
  document.getElementById('scoreBleu').textContent = partie.scoreBleu;
  document.getElementById('scoreRouge').textContent = partie.scoreRouge;
}

function miseAuJeu() {
  rondelle.x = CENTRE_X;
  rondelle.y = CENTRE_Y;
  rondelle.vx = 0;
  rondelle.vy = 0;
  rondelle.proprietaire = null;
  rondelle.trainee.length = 0;

  for (const j of lesJoueurs) {
    j.x = j.departX;
    j.y = j.departY;
    j.vx = 0;
    j.vy = 0;
    j.angle = (j === joueurBleu) ? 0 : Math.PI;
    j.delaiReprise = 0;
  }
}

/* =========================================================
   LA BOUCLE DE JEU
========================================================= */
function boucle() {
  if (etat === 'jeu') {
    if (partie.pauseBut > 0) {
      partie.pauseBut--;
      if (partie.pauseBut === 0) {
        terminerPause();
      }
    } else {
      const { px, py } = pousseeClavier();
      appliquerPoussee(joueurBleu, px, py);

      const decision = cerveauIA(joueurRouge);
      appliquerPoussee(joueurRouge, decision.px, decision.py);

      collisionJoueurs(joueurBleu, joueurRouge);
      verifierLancerHumain();
      verifierPossession();
      bougerRondelle(rondelle);
      verifierBut();
      avancerChrono();

      for (const j of lesJoueurs) {
        if (j.delaiReprise > 0) j.delaiReprise--;
      }
    }
  }

  ctx.clearRect(0, 0, LARGEUR, HAUTEUR);
  dessinerPatinoire();
  dessinerLumiereBut();
  dessinerFilets();
  dessinerRondelle(rondelle);
  for (const j of lesJoueurs) {
    dessinerJoueur(j);
  }
  dessinerMessage();

  requestAnimationFrame(boucle);
}

boucle();
</script>
