<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Démo — Modèle réparé</title>
<style>
  body { margin: 0; background: radial-gradient(ellipse at 50% 35%, #1a3450 0%, #0a1119 70%); font-family: 'Segoe UI', Arial, sans-serif; color: #e8eef4; overflow: hidden; }
  #info { position: fixed; top: 0; left: 0; right: 0; padding: 14px 20px; z-index: 10; background: linear-gradient(180deg, rgba(10,17,25,0.9), transparent); pointer-events: none; }
  #info h1 { font-size: 18px; margin: 0 0 4px; }
  #info p { font-size: 13px; margin: 0; color: #9db2c7; }
  #etat { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 22px; border-radius: 20px; font-size: 14px; z-index: 10; background: rgba(20,38,61,0.9); border: 1px solid #33475e; }
  #etat.ok { border-color: #7dd87d; color: #7dd87d; }
  #etat.err { border-color: #ff5a5a; color: #ff5a5a; }
</style>
</head>
<body>
  <div id="info">
    <h1>🏒 Modèle RÉPARÉ (sans le squelette brisé)</h1>
    <p>Le maillage figé en pose T, avec sa texture</p>
  </div>
  <div id="etat">⏳ Chargement...</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    const etat = document.getElementById('etat');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a1119);
    const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.01, 1000);
    camera.position.set(2, 1.5, 3);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    document.body.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xdfe8f5, 0.8));
    const l1 = new THREE.DirectionalLight(0xfff4e0, 1.1); l1.position.set(3,5,2); scene.add(l1);
    const l2 = new THREE.DirectionalLight(0xbcd4ff, 0.5); l2.position.set(-3,2,-2); scene.add(l2);
    const sol = new THREE.Mesh(new THREE.CircleGeometry(1.5, 40), new THREE.MeshStandardMaterial({ color: 0x16283d, roughness: 0.8 }));
    sol.rotation.x = -Math.PI/2; scene.add(sol);
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; controls.target.set(0, 0.8, 0);
    const loader = new THREE.GLTFLoader();
    loader.load('hockey_player_FIXED.glb', (gltf) => {
      const modele = gltf.scene;
      let n = 0;
      modele.traverse(o => { if (o.isMesh) { n++; o.frustumCulled = false; o.castShadow = true; if(o.material) o.material.side = THREE.DoubleSide; } });
      const b0 = new THREE.Box3().setFromObject(modele);
      const h0 = b0.getSize(new THREE.Vector3()).y || 1;
      modele.scale.setScalar(1.6/h0);
      const b = new THREE.Box3().setFromObject(modele);
      const c = b.getCenter(new THREE.Vector3());
      modele.position.x -= c.x; modele.position.z -= c.z; modele.position.y -= b.min.y;
      scene.add(modele);
      etat.className='ok'; etat.textContent = '✓ Chargé! '+n+' maillage(s) — hauteur '+h0.toFixed(2);
    }, undefined, (e) => { etat.className='err'; etat.textContent='✗ '+e; });
    function animer(){ requestAnimationFrame(animer); controls.update(); renderer.render(scene, camera); }
    animer();
    addEventListener('resize', () => { camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
  </script>
</body>
</html>
